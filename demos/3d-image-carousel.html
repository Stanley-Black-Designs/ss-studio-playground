  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0c0d10;
      color: #f0f0f2;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .img-carousel__wrap {
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      display: flex;
    }

    .img-carousel__list {
      z-index: 1;
      perspective: 90vw;
      perspective-origin: 50%;
      transform-style: preserve-3d;
      justify-content: center;
      align-items: center;
      width: 80vw;
      height: 50vw;
      margin-left: auto;
      margin-right: auto;
      font-size: 1vw;
      display: flex;
      position: relative;
    }

    .img-carousel__panel {
      z-index: 0;
      flex-direction: column;
      flex: none;
      justify-content: space-between;
      align-items: stretch;
      width: 13em;
      height: 39em;
      display: flex;
      position: absolute;
    }

    .img-carousel__panel:nth-of-type(even) {
      justify-content: center;
    }

    .img-carousel__item {
      aspect-ratio: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .img-carousel__img {
      object-fit: cover;
      width: 100%;
      max-width: none;
      height: 100%;
      position: absolute;
      inset: 0%;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/InertiaPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Observer.min.js"></script>

  <script>
    gsap.registerPlugin(Draggable, InertiaPlugin, Observer, ScrollTrigger);

    function init3dImageCarousel() {
      let radius;
      let draggableInstance;
      let observerInstance;
      let spin;
      let intro;
      let lastWidth = window.innerWidth;

      const wrap = document.querySelector('[data-3d-carousel-wrap]');
      if (!wrap) return;

      const calcRadius = () => {
        radius = window.innerWidth * 0.5;
      };

      const destroy = () => {
        draggableInstance && draggableInstance.kill();
        observerInstance && observerInstance.kill();
        spin && spin.kill();
        intro && intro.kill();
        ScrollTrigger.getAll().forEach(st => st.kill());
        const panels = wrap.querySelectorAll('[data-3d-carousel-panel]');
        gsap.set(panels, { clearProps: 'transform' });
      };

      const create = () => {
        calcRadius();

        const panels = wrap.querySelectorAll('[data-3d-carousel-panel]');
        const content = wrap.querySelectorAll('[data-3d-carousel-content]');
        const proxy = document.createElement('div');
        const wrapProgress = gsap.utils.wrap(0, 1);
        const dragDistance = window.innerWidth * 3;
        let startProg;

        panels.forEach(p =>
          p.style.transformOrigin = `50% 50% ${-radius}px`
        );

        spin = gsap.fromTo(
          panels,
          { rotationY: i => (i * 360) / panels.length },
          { rotationY: '-=360', duration: 30, ease: 'none', repeat: -1 }
        );

        spin.progress(1000);

        draggableInstance = Draggable.create(proxy, {
          trigger: wrap,
          type: 'x',
          inertia: true,
          allowNativeTouchScrolling: true,
          onPress() {
            gsap.to(content, {
              clipPath: 'inset(5%)',
              duration: 0.3,
              ease: 'power4.out',
              overwrite: 'auto'
            });
            gsap.killTweensOf(spin);
            spin.timeScale(0);
            startProg = spin.progress();
          },
          onDrag() {
            const p = startProg + (this.startX - this.x) / dragDistance;
            spin.progress(wrapProgress(p));
          },
          onThrowUpdate() {
            const p = startProg + (this.startX - this.x) / dragDistance;
            spin.progress(wrapProgress(p));
          },
          onRelease() {
            if (!this.tween || !this.tween.isActive()) {
              gsap.to(spin, { timeScale: 1, duration: 0.1 });
            }
            gsap.to(content, {
              clipPath: 'inset(0%)',
              duration: 0.5,
              ease: 'power4.out',
              overwrite: 'auto'
            });
          },
          onThrowComplete() {
            gsap.to(spin, { timeScale: 1, duration: 0.1 });
          }
        })[0];

        intro = gsap.timeline({
          scrollTrigger: {
            trigger: wrap,
            start: 'top 80%',
            end: 'bottom top',
            scrub: false,
            toggleActions: 'play resume play play'
          },
          defaults: { ease: 'expo.inOut' }
        });
        intro
          .fromTo(spin, { timeScale: 15 }, { timeScale: 1, duration: 2 })
          .fromTo(wrap, { scale: 0.5, rotation: 12 }, { scale: 1, rotation: 5, duration: 1.2 }, '<')
          .fromTo(content, { autoAlpha: 0 }, { autoAlpha: 1, stagger: { amount: 0.8, from: 'random' } }, '<');

        observerInstance = Observer.create({
          target: window,
          type: 'wheel,scroll,touch',
          onChangeY: self => {
            let v = gsap.utils.clamp(-60, 60, self.velocityY * 0.005);
            spin.timeScale(v);
            const resting = v < 0 ? -1 : 1;

            gsap.fromTo(
              { value: v },
              { value: v },
              {
                value: resting,
                duration: 1.2,
                onUpdate() {
                  spin.timeScale(this.targets()[0].value);
                }
              }
            );
          }
        });
      };

      create();

      const debounce = (fn, ms) => {
        let t;
        return () => {
          clearTimeout(t);
          t = setTimeout(fn, ms);
        };
      };

      window.addEventListener('resize', debounce(() => {
        const newWidth = window.innerWidth;
        if (newWidth !== lastWidth) {
          lastWidth = newWidth;
          destroy();
          create();
          ScrollTrigger.refresh();
        }
      }, 200));
    }

    document.addEventListener('DOMContentLoaded', () => {
      init3dImageCarousel();
    });
  </script>
