<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radial Cards Slider — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#353d35;font-family:'Inter',sans-serif;padding-top:50px;-webkit-font-smoothing:antialiased;overflow-x:clip}
    .demo-section{min-height:calc(100dvh - 50px);display:flex;background-color:#353d35}
    .radial-gsap-slider{gap:5em;flex-flow:column;justify-content:center;align-items:center;width:100%;padding-top:5em;display:flex;position:relative}
    [data-radial-slider-init]{--slider-rotate:18deg;--slider-radius:375%}
    .radial-gsap-slider__collection{max-width:100%;position:relative}
    .radial-gsap-slider__list{-webkit-user-select:none;user-select:none;will-change:transform;touch-action:pan-y;backface-visibility:hidden;justify-content:center;align-items:center;max-width:100%;display:flex;position:relative}
    [data-radial-slider-list]>:first-child{position:relative}
    .radial-gsap-slider__item{width:20em;transform-origin:50% var(--slider-radius);flex:none;position:absolute}
    @media screen and (max-width:767px){[data-radial-slider-init]{--slider-rotate:12deg;--slider-radius:475%}[data-radial-slider-item]{width:15em}}
    .demo-card{color:#353d35;text-align:center;background-color:#e8e8e2;border-radius:1.375em;flex-flow:column;align-items:flex-start;width:100%;padding-top:.625em;padding-left:.625em;padding-right:.625em;display:flex}
    .demo-card__media{aspect-ratio:8/9;border-radius:.75em;width:100%;position:relative}
    .cover-image{object-fit:cover;border-radius:inherit;width:100%;height:100%;position:absolute;top:0;left:0}
    .demo-card__info{justify-content:center;align-items:center;width:100%;height:4.5em;padding:.625em;display:flex}
    .demo-card__h{text-transform:uppercase;margin:0;font-size:1.3125em;font-weight:900;line-height:1}
    .radial-gsap-slider__controls{gap:1em;justify-content:center;align-items:center;padding:3em;display:flex;position:relative}
    .radial-gsap-slider__control-btn{z-index:1;color:#e8e8e2;letter-spacing:-.02em;cursor:pointer;background-color:#1f251f;border-radius:50em;height:3em;padding:0 1.5em;font-size:1em;font-weight:600;position:relative;border:none}
    .radial-gsap-slider__control-btn.is--next{color:#353d35;background-color:#e8e8e2}
    .radial-gsap-slider__dots{justify-content:center;align-items:center;display:flex}
    .radial-gsap-slider__control-dot{z-index:1;color:#4c554c;cursor:pointer;background-color:currentColor;border:.1875em solid #353d35;border-radius:50em;width:.875em;height:.875em;padding:0;font-size:1em;transition:color .1s ease;position:relative;overflow:hidden;outline:0!important;box-shadow:0 0 #0000!important}
    .radial-gsap-slider__control-dot[data-radial-slider-control-status="active"]{color:#ABA994}
  </style>
</head>
<body>
  <div class="demo-chrome" style="background:rgba(53,61,53,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(232,232,226,0.5);"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep" style="background:rgba(255,255,255,0.1);"></div>
      <span class="demo-chrome__title" style="color:#e8e8e2;">Radial Cards Slider</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-section">
    <div data-radial-slider-drag-status="grab" data-radial-slider-init="" class="radial-gsap-slider">
      <div data-radial-slider-collection="" class="radial-gsap-slider__collection">
        <div data-radial-slider-list="" class="radial-gsap-slider__list">
          <div data-radial-slider-item-status="active" data-radial-slider-item="" class="radial-gsap-slider__item"><div class="demo-card"><div class="demo-card__media"><img src="https://cdn.prod.website-files.com/6a466f2af326ef4f6fa96bea/6a4d1c01a1f65fd36288d7ef_Serene%20Outdoor%20Portrait.avif" loading="lazy" alt="" class="cover-image"></div><div class="demo-card__info"><h3 class="demo-card__h">RÄDIAL</h3></div></div></div>
          <div data-radial-slider-item-status="inview" data-radial-slider-item="" class="radial-gsap-slider__item"><div class="demo-card"><div class="demo-card__media"><img src="https://cdn.prod.website-files.com/6a466f2af326ef4f6fa96bea/6a4d45b12f3875c58d8221f4_Tropical%20Cocktail%20Scene.avif" loading="lazy" alt="" class="cover-image"></div><div class="demo-card__info"><h3 class="demo-card__h">TRØPICAL</h3></div></div></div>
          <div data-radial-slider-item-status="inview" data-radial-slider-item="" class="radial-gsap-slider__item"><div class="demo-card"><div class="demo-card__media"><img src="https://cdn.prod.website-files.com/6a466f2af326ef4f6fa96bea/6a4d3b4bddf3fe861d763d39_Translucent%20Leaf%20Veins.avif" loading="lazy" alt="" class="cover-image"></div><div class="demo-card__info"><h3 class="demo-card__h">LEĀF</h3></div></div></div>
          <div data-radial-slider-item-status="inview" data-radial-slider-item="" class="radial-gsap-slider__item"><div class="demo-card"><div class="demo-card__media"><img src="https://cdn.prod.website-files.com/6a466f2af326ef4f6fa96bea/6a4d3b842ef017e090cc0d85_Cyclist%20in%20Dubai%20Scene.avif" loading="lazy" alt="" class="cover-image"></div><div class="demo-card__info"><h3 class="demo-card__h">DÜBAI</h3></div></div></div>
          <div data-radial-slider-item-status="inview" data-radial-slider-item="" class="radial-gsap-slider__item"><div class="demo-card"><div class="demo-card__media"><img src="https://cdn.prod.website-files.com/6a466f2af326ef4f6fa96bea/6a4d3bea2f3875c58d7c3936_Yoga%20in%20Serene%20Setting.avif" loading="lazy" alt="" class="cover-image"></div><div class="demo-card__info"><h3 class="demo-card__h">YØGA</h3></div></div></div>
        </div>
      </div>
      <div class="radial-gsap-slider__controls">
        <button data-radial-slider-control="prev" class="radial-gsap-slider__control-btn">Prev</button>
        <div data-radial-slider-generate-dots="" class="radial-gsap-slider__dots">
          <button data-radial-slider-control="1" data-radial-slider-control-status="active" class="radial-gsap-slider__control-dot"></button>
        </div>
        <button data-radial-slider-control="next" class="radial-gsap-slider__control-btn is--next">Next</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/InertiaPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/CustomEase.min.js"></script>
  <script>
    gsap.registerPlugin(Draggable,InertiaPlugin,CustomEase);
    CustomEase.create("radial","0.25, 0.1, 0, 1");
    function initRadialCardsSlider(){const slideDuration=1;const clickEase='radial';document.querySelectorAll('[data-radial-slider-init]').forEach(container=>{if(container._radialSliderDraggable)container._radialSliderDraggable.kill();if(container._radialSliderProxy)gsap.killTweensOf(container._radialSliderProxy);if(container._radialSliderProxyEl)container._radialSliderProxyEl.remove();const collection=container.querySelector('[data-radial-slider-collection]');const track=container.querySelector('[data-radial-slider-list]');if(!collection||!track)return;container.querySelectorAll('[data-radial-slider-clone]').forEach(el=>el.remove());const originalItems=Array.from(container.querySelectorAll('[data-radial-slider-item]:not([data-radial-slider-clone])'));if(!originalItems.length)return;const dotsWrap=container.querySelector('[data-radial-slider-generate-dots]');if(dotsWrap){const dots=Array.from(dotsWrap.querySelectorAll('[data-radial-slider-control]'));if(dots.length){const firstDot=dots[0];dots.slice(1).forEach(dot=>dot.remove());firstDot.setAttribute('data-radial-slider-control','1');firstDot.setAttribute('data-radial-slider-control-status','not-active');for(let i=2;i<=originalItems.length;i++){const dot=firstDot.cloneNode(true);dot.setAttribute('data-radial-slider-control',String(i));dot.setAttribute('data-radial-slider-control-status','not-active');dotsWrap.appendChild(dot);}}}const controls=Array.from(container.querySelectorAll('[data-radial-slider-control]'));const totalEl=container.querySelector('[data-radial-slider-total-slide]');const indicators=Array.from(container.querySelectorAll('[data-radial-slider-active-slide]'));originalItems.forEach((item,index)=>{item.removeAttribute('data-radial-slider-item-status');item.removeAttribute('aria-hidden');item.setAttribute('role','group');item.setAttribute('aria-label',`Slide ${index+1} of ${originalItems.length}`);});controls.forEach(btn=>{const value=btn.getAttribute('data-radial-slider-control');if(value==='prev')btn.setAttribute('aria-label','Previous slide');if(value==='next')btn.setAttribute('aria-label','Next slide');if(/^\d+$/.test(value)){btn.setAttribute('aria-label',`Go to slide ${value}`);btn.setAttribute('aria-current','false');}});track.style.height='';const setNumber=(el,value)=>{if(!el)return;el.textContent=value<10?'0'+value:String(value);};const mod=(value,total)=>((value%total)+total)%total;setNumber(totalEl,originalItems.length);const containerStyles=getComputedStyle(container);const rotateStep=Math.abs(parseFloat(containerStyles.getPropertyValue('--slider-rotate')))||18;const maxLoopItems=Math.max(1,Math.floor(360/rotateStep));const firstRect=originalItems[0].getBoundingClientRect();const itemWidth=firstRect.width;const itemHeight=firstRect.height;const originParts=getComputedStyle(originalItems[0]).transformOrigin.split(' ');const originY=parseFloat(originParts[1])||itemHeight*3.75;const wheelRadius=Math.max(0,originY-itemHeight/2);const proxyRadius=wheelRadius+Math.max(itemWidth,itemHeight)*0.525;const getBoundsAtAngle=angle=>{const rad=angle*Math.PI/180;return{x:Math.sin(rad)*wheelRadius,y:originY-Math.cos(rad)*wheelRadius,halfWidth:Math.abs(Math.cos(rad))*itemWidth/2+Math.abs(Math.sin(rad))*itemHeight/2,halfHeight:Math.abs(Math.sin(rad))*itemWidth/2+Math.abs(Math.cos(rad))*itemHeight/2};};const isOffsetInsideContainer=offset=>{const containerRect=container.getBoundingClientRect();const trackRect=track.getBoundingClientRect();const originX=trackRect.left+trackRect.width/2;const originYTop=trackRect.top;const leftLimit=containerRect.left-originX;const rightLimit=containerRect.right-originX;const topLimit=containerRect.top-originYTop;const bottomLimit=containerRect.bottom-originYTop;const bounds=getBoundsAtAngle(offset*rotateStep);const cardLeft=bounds.x-bounds.halfWidth;const cardRight=bounds.x+bounds.halfWidth;const cardTop=bounds.y-bounds.halfHeight;const cardBottom=bounds.y+bounds.halfHeight;return cardRight>=leftLimit&&cardLeft<=rightLimit&&cardBottom>=topLimit&&cardTop<=bottomLimit;};const getVisibleOffsets=()=>{const offsets=[0];const maxSide=Math.ceil(maxLoopItems/2);let leftEdge=0;let rightEdge=0;for(let i=1;i<=maxSide;i++){if(!isOffsetInsideContainer(i))break;offsets.push(i);rightEdge=i;}for(let i=1;i<=maxSide;i++){if(!isOffsetInsideContainer(-i))break;offsets.unshift(-i);leftEdge=-i;}const nextLeft=leftEdge-1;const nextRight=rightEdge+1;if(Math.abs(nextLeft)<=maxSide)offsets.unshift(nextLeft);if(Math.abs(nextRight)<=maxSide)offsets.push(nextRight);return offsets;};const visibleOffsets=getVisibleOffsets();const minItemsNeeded=Math.min(maxLoopItems,Math.max(originalItems.length,visibleOffsets.length));const neededItems=Math.ceil(minItemsNeeded/originalItems.length)*originalItems.length;const currentItems=Array.from(container.querySelectorAll('[data-radial-slider-item]:not([data-radial-slider-clone])'));for(let i=currentItems.length;i<neededItems;i++){const clone=currentItems[i%currentItems.length].cloneNode(true);clone.setAttribute('data-radial-slider-clone','');clone.setAttribute('aria-hidden','true');track.appendChild(clone);}const items=Array.from(track.querySelectorAll(':scope > [data-radial-slider-item]'));const totalItems=items.length;track.style.height=itemHeight+'px';items.forEach(item=>{item.setAttribute('data-radial-slider-item-status','not-active');});container.setAttribute('data-radial-slider-drag-status','grab');const containerRect=container.getBoundingClientRect();const collectionRect=collection.getBoundingClientRect();const trackRect=track.getBoundingClientRect();const proxyWrap=document.createElement('div');proxyWrap.setAttribute('data-radial-slider-proxy-wrap','');Object.assign(proxyWrap.style,{position:'absolute',left:containerRect.left-collectionRect.left+'px',top:containerRect.top-collectionRect.top+'px',width:containerRect.width+'px',height:containerRect.height+'px',overflow:'hidden',pointerEvents:'none'});const proxy=document.createElement('div');proxy.setAttribute('data-radial-slider-proxy','');Object.assign(proxy.style,{position:'absolute',width:proxyRadius*2+'px',height:proxyRadius*2+'px',left:trackRect.left+trackRect.width/2-containerRect.left+'px',top:trackRect.top-containerRect.top+originY-proxyRadius+'px',transform:'translateX(-50%)',borderRadius:'50%',pointerEvents:'auto',opacity:'0'});proxyWrap.appendChild(proxy);collection.appendChild(proxyWrap);container._radialSliderProxy=proxy;container._radialSliderProxyEl=proxyWrap;const setRotation=items.map(item=>gsap.quickSetter(item,'rotation','deg'));gsap.set(proxy,{rotation:0});const getIndexFromProxy=()=>-gsap.getProperty(proxy,'rotation')/rotateStep;const nearestDelta=(index,realIndex,total)=>{const loop=Math.round((realIndex-index)/total);return index-(realIndex-loop*total);};const nearestDeltaToSlideNumber=(targetNumber,realIndex)=>{let bestDelta=0;let bestDistance=Infinity;items.forEach((item,index)=>{const slideNumber=index%originalItems.length;if(slideNumber!==targetNumber)return;const delta=nearestDelta(index,realIndex,totalItems);const distance=Math.abs(delta);if(distance<bestDistance){bestDistance=distance;bestDelta=delta;}});return bestDelta;};let lastActiveIndex=null;const setIndicator=index=>{const value=index+1;const text=value<10?'0'+value:String(value);indicators.forEach(el=>{el.textContent=text;});};const updateControlStatus=activeIndex=>{controls.forEach(btn=>{const value=btn.getAttribute('data-radial-slider-control');if(!/^\d+$/.test(value))return;const index=Math.max(0,Math.min(originalItems.length-1,parseInt(value,10)-1));const isActive=index===activeIndex;btn.setAttribute('data-radial-slider-control-status',isActive?'active':'not-active');btn.setAttribute('aria-current',isActive?'true':'false');});};const updateActiveUI=activeIndex=>{if(activeIndex===lastActiveIndex)return;setIndicator(activeIndex);updateControlStatus(activeIndex);lastActiveIndex=activeIndex;};const render=()=>{const realIndex=getIndexFromProxy();const activeIndex=mod(Math.round(realIndex),totalItems);const activeSlideIndex=activeIndex%originalItems.length;items.forEach((item,index)=>{const rotation=nearestDelta(index,realIndex,totalItems)*rotateStep;item.setAttribute('data-radial-slider-item-status',index===activeIndex?'active':'inview');setRotation[index](rotation);});updateActiveUI(activeSlideIndex);};controls.forEach(btn=>{btn.disabled=false;const value=btn.getAttribute('data-radial-slider-control');if(value==='next'||value==='prev'){btn.onclick=()=>{gsap.killTweensOf(proxy);const currentIndex=getIndexFromProxy();const targetIndex=Math.round(currentIndex)+(value==='next'?1:-1);gsap.to(proxy,{rotation:-targetIndex*rotateStep,duration:slideDuration,ease:clickEase,onUpdate:render});};}if(/^\d+$/.test(value)){const targetSlideNumber=Math.max(0,Math.min(originalItems.length-1,parseInt(value,10)-1));btn.onclick=()=>{gsap.killTweensOf(proxy);const currentIndex=getIndexFromProxy();const delta=nearestDeltaToSlideNumber(targetSlideNumber,currentIndex);gsap.to(proxy,{rotation:-(currentIndex+delta)*rotateStep,duration:slideDuration,ease:clickEase,onUpdate:render});};}});container._radialSliderDraggable=Draggable.create(proxy,{type:'rotation',trigger:[proxy,...items],inertia:true,throwResistance:2000,dragResistance:0.05,maxDuration:1,minDuration:0.5,edgeResistance:0.75,overshootTolerance:0,snap:value=>Math.round(value/rotateStep)*rotateStep,onDrag:render,onThrowUpdate:render,onThrowComplete:()=>{container.setAttribute('data-radial-slider-drag-status','grab');render();},onPress:()=>container.setAttribute('data-radial-slider-drag-status','grabbing'),onDragStart:()=>container.setAttribute('data-radial-slider-drag-status','grabbing'),onRelease:()=>container.setAttribute('data-radial-slider-drag-status','grab')})[0];render();});if(initRadialCardsSlider._resize){window.removeEventListener('resize',initRadialCardsSlider._resize);}initRadialCardsSlider._resize=debounceOnWidthChange(initRadialCardsSlider,200);window.addEventListener('resize',initRadialCardsSlider._resize);}
    function debounceOnWidthChange(fn,ms){let lastWidth=window.innerWidth;let timer;return function(...args){clearTimeout(timer);timer=setTimeout(()=>{if(window.innerWidth===lastWidth)return;lastWidth=window.innerWidth;fn.apply(this,args);},ms);};}
    document.addEventListener('DOMContentLoaded',()=>{initRadialCardsSlider();});
  </script>
</body>
</html>
