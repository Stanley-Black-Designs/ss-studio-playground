<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Text with Gravity — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#2a0a2e;color:#f0f0f2;font-family:'Inter',sans-serif;padding-top:50px}
    .drop-wrapper{width:100%;min-height:350vh}
    .drop-section{justify-content:center;align-items:center;width:100%;min-height:100vh;display:flex;position:relative;overflow:hidden}
    .drop-heading{text-align:center;max-width:40rem;margin:0;font-size:clamp(2rem,5vw,4rem);font-weight:500;line-height:1}
    .drop-heading-img{z-index:2;width:1.2em;display:inline-block;position:relative}
    .drop-heading-img img{width:100%;max-width:100%}
    .drop-heading-img.is--first{transform:rotate(-20deg) translate(.15em,-.2em)}
    .drop-heading-img.is--second{transform:translate(-.1em,.2em) rotate(10deg)}
    .drop-heading-img.is--third{margin-left:-.1em;margin-right:-.1em;margin-top:-.2em;transform:translate(-.05em,.1em) rotate(50deg)}
    [data-drop-text] .line{display:block}
    .scroll-hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,240,242,0.3);pointer-events:none}
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Falling Text with Gravity</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="drop-wrapper">
    <div class="drop-section">
      <h1 data-drop-text="" class="drop-heading">This is just a<span data-drop-img="" class="drop-heading-img is--first"><img src="https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a62d0bb34b74d3514ecab_shape-squigle-1.png"></span>random quote<span data-drop-img="" class="drop-heading-img is--second"><img src="https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a62d0bb34b74d3514ecad_shape-squigle-2.png"></span>we used</h1>
    </div>
    <div class="drop-section">
      <h1 data-drop-text="" class="drop-heading">See how our window acts like<span data-drop-img="" class="drop-heading-img is--third"><img src="https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a62d0bb34b74d3514ecaf_shape-squigle-3.png"></span> a roof?</h1>
    </div>
    <div class="drop-section">
      <h1 data-drop-text="" class="drop-heading">So much fun!</h1>
    </div>
  </div>
  <p class="scroll-hint">↓ Scroll to trigger</p>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Physics2DPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger,SplitText,Physics2DPlugin);
    function initFallingTextGravity(){new SplitText("[data-drop-text]",{type:"lines, chars",autoSplit:true,linesClass:"line",onSplit(self){let ctx=gsap.context(()=>{self.lines.forEach((line)=>{gsap.timeline({scrollTrigger:{once:true,trigger:line,start:"top top-=10"}}).to(line.children,{duration:"random(1.5, 3)",physics2D:{velocity:"random(500, 1000)",angle:90,gravity:3000},rotation:"random(-90, 90)",ease:"none"}).to(line.children,{autoAlpha:0,duration:0.2},"-=.2");});});return ctx;}});}
    document.addEventListener("DOMContentLoaded",()=>{initFallingTextGravity();});
  </script>
</body>
</html>
