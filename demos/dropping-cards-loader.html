<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropping Cards Loader — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    .loading-container{z-index:100;pointer-events:none;position:fixed;inset:0}
    .loading-screen{pointer-events:auto;color:#fff;justify-content:center;align-items:center;width:100%;height:100%;display:flex;position:absolute;top:0;left:0;overflow:clip}
    .loading-screen__background{background-color:#0c0d10;width:100%;height:100%;position:absolute}
    .loading-screen__logo{position:absolute;bottom:2em;left:50%;transform:translateX(-50%);font-size:clamp(16px,2vw,22px);font-weight:300;letter-spacing:-.02em;color:#f0f0f2;opacity:.6}
    .loading-screen__list{gap:.5em;opacity:0;justify-content:center;align-items:center;display:flex;position:relative}
    .loading-screen__card{aspect-ratio:3/4;border-radius:.5em;width:10em;font-size:max(1.5vw,1.5em);position:absolute}
    .cover-image{object-fit:cover;border-radius:inherit;width:100%;height:100%;display:block;position:absolute;top:0;left:0}
    .cover-image.is--bg{height:130%}
    .loading-header{justify-content:center;align-items:center;min-height:100svh;display:flex;position:relative;overflow:clip;background:#1a0e0a}
    .loading-header__h1{color:#fff;text-align:center;letter-spacing:-.04em;white-space:nowrap;margin-top:0;margin-bottom:10dvh;font-size:min(14vw,7em);font-weight:200;line-height:1;position:relative}
    /* Replay button */
    .replay-btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50em;padding:10px 24px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;opacity:0;transition:opacity .3s;pointer-events:none}
    .replay-btn.visible{opacity:1;pointer-events:auto}
    /* Back link */
    .back-link{position:fixed;top:16px;left:20px;z-index:200;color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:#fff}
  </style>
</head>
<body>
  <a href="../index.html" class="back-link"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>

  <div data-loading-container="" class="loading-container">
    <div class="loading-screen">
      <div data-loading-background="" class="loading-screen__background"></div>
      <div data-loading-logo="" class="loading-screen__logo">Stanley Smith Studios</div>
      <div data-loading-cards-list="" class="loading-screen__list">
        <div data-loading-card="" class="loading-screen__card"><img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a423dbf2b6b7cd5bbd13f57_Striped_Fabric_Flowing_Against_Clear_Blue_Sky.avif" loading="lazy" alt="" class="cover-image"></div>
        <div data-loading-card="" class="loading-screen__card"><img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a423dbff54dad74005c11e5_Majestic_Rock_Formations_Under_Soft_Sky.avif" loading="lazy" alt="" class="cover-image"></div>
        <div data-loading-card="" class="loading-screen__card"><img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a423dbf4721a5f823f14da4_Serene_Senior_Woman_in_Warm_Sunlight_Against_Clear_Blue_Sky.avif" loading="lazy" alt="" class="cover-image"></div>
        <div data-loading-card="" class="loading-screen__card"><img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a42689a25fe47bc5049a99b_Tranquil_Rowing_at_Sunrise_with_Birds_in_Flight.avif" loading="lazy" alt="" class="cover-image"></div>
        <div data-loading-card="" class="loading-screen__card"><img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a423dbf69f858fcfa5ea9af_Hands_Holding_Striped_Towel_Against_Clear_Summer_Sky.avif" loading="lazy" alt="" class="cover-image"></div>
      </div>
    </div>
  </div>

  <section data-loading-header="" class="loading-header">
    <img src="https://cdn.prod.website-files.com/6a423981a98fdcf4095b10ff/6a42622f73b228980544aaa6_Serene_Red_Hills_Under_Clear_Blue_Sky.avif" loading="lazy" alt="" class="cover-image is--bg">
    <h1 class="loading-header__h1">Stanley Smith</h1>
  </section>

  <button class="replay-btn" id="replayBtn">↺ Replay</button>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/CustomEase.min.js"></script>
  <script>
    gsap.registerPlugin(CustomEase);
    CustomEase.create("osmo","M0,0 C0.625,0.05 0,1 1,1");
    function initDroppingCardsLoadingAnimation(){const container=document.querySelector("[data-loading-container]");const cardsList=gsap.utils.toArray(container.querySelectorAll("[data-loading-cards-list]"));const cards=gsap.utils.toArray(container.querySelectorAll("[data-loading-card]"));const background=container.querySelectorAll("[data-loading-background]");const logo=container.querySelectorAll("[data-loading-logo]");const header=document.querySelectorAll("[data-loading-header]");const scaleDecrease=0.1;const yOffset=-7.5;const totalFallStagger=0.75;const deckMoveDuration=1;const rotationPattern=[-10,10,-15,10,20];const xPattern=[-5,7.5,10,5,-10];const has=(items)=>items.length;const patternValue=(pattern,index)=>pattern[index%pattern.length];function getStack(index,total){const reverseIndex=total-1-index;return{scale:1-(reverseIndex*scaleDecrease),yPercent:reverseIndex*yOffset};}function stackProp(prop,total){return(index)=>getStack(index,total)[prop];}function getFallY(card){const containerRect=container.getBoundingClientRect();const cardRect=card.getBoundingClientRect();return(containerRect.bottom-cardRect.top)+cardRect.height;}const tl=gsap.timeline({onComplete:()=>{document.getElementById('replayBtn').classList.add('visible');}});if(has(cardsList)){tl.fromTo(cardsList,{opacity:0},{opacity:1,duration:0.3},0.5);}if(has(cards)){tl.fromTo(cards,{rotate:0.001,scale:0.5,yPercent:0},{rotate:0.001,scale:stackProp("scale",cards.length),yPercent:stackProp("yPercent",cards.length),stagger:-0.05,duration:1.5,ease:"elastic.out(1,0.7)"},"<");const fallCards=cards.slice().reverse();const fallStagger=totalFallStagger/Math.max(cards.length-1,1);const fallStart=tl.duration();fallCards.forEach((card,fallIndex)=>{const remainingCards=cards.slice(0,cards.indexOf(card));const fallTime=fallStart+(fallIndex*fallStagger);if(has(remainingCards)){tl.to(remainingCards,{scale:stackProp("scale",remainingCards.length),yPercent:stackProp("yPercent",remainingCards.length),duration:deckMoveDuration,ease:"sine.inOut"},fallTime);}tl.to(card,{y:()=>getFallY(card),xPercent:patternValue(xPattern,fallIndex),rotate:patternValue(rotationPattern,fallIndex),duration:0.8,ease:"power4.in"},fallTime);});}if(has(background)){tl.to(background,{rotate:0.001,yPercent:100,duration:1.5,ease:"osmo"},"-=0.6");}if(has(header)){tl.from(header,{rotate:0.001,yPercent:-25,scale:1.1,duration:1.5,ease:"osmo"},"<");}if(has(logo)){tl.to(logo,{rotate:0.001,yPercent:100,opacity:0,duration:0.8,ease:"power4.in"},"<-=1.5");}return tl;}
    document.addEventListener('DOMContentLoaded',()=>{
      const tl = initDroppingCardsLoadingAnimation();
      document.getElementById('replayBtn').addEventListener('click',()=>{
        document.getElementById('replayBtn').classList.remove('visible');
        tl.restart();
      });
    });
  </script>
</body>
</html>
