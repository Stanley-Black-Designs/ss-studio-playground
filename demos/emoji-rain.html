<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Rain Effect — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#b8c4e0;font-family:'Inter',sans-serif;padding-top:50px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .demo-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5em;padding:40px 24px}

    /* Container covers full viewport — height must be set explicitly */
    .emoji-rain-container{
      z-index:150;
      pointer-events:none;
      user-select:none;
      -webkit-user-select:none;
      position:fixed;
      top:0;left:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    /* Each spawned emoji */
    .rain-emoji{
      position:absolute;
      font-size:clamp(60px,10vw,100px);
      line-height:1;
      will-change:transform;
      pointer-events:none;
      user-select:none;
    }

    /* Buttons */
    .btn-wrap{gap:1.25em;flex-flow:column;align-items:center;display:flex}
    .emoji-rain-btn{
      gap:.5em;
      cursor:pointer;
      background-color:#fff;
      border-radius:10em;
      align-items:center;
      padding:.5em 1.5em .5em 1.25em;
      font-family:'Inter',sans-serif;
      font-size:clamp(1em,3vw,1.6em);
      font-weight:700;
      color:#1a1240;
      transition:transform .3s cubic-bezier(.45,.422,.269,1.702);
      display:flex;
      transform:scale(1) rotate(.001deg);
      border:none;
      -webkit-user-select:none;
      user-select:none;
    }
    .emoji-rain-btn:hover{transform:scale(1.05) rotate(.001deg)}
    .hint{color:rgba(26,18,64,0.4);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
  </style>
</head>
<body>
  <div class="demo-chrome" style="background:rgba(184,196,224,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(26,18,64,0.55);"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep" style="background:rgba(0,0,0,0.12);"></div>
      <span class="demo-chrome__title" style="color:#1a1240;">Emoji Rain Effect</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>

  <!-- Fixed overlay — emojis spawn here -->
  <div class="emoji-rain-container" id="emoji-rain-container"></div>

  <div class="demo-stage">
    <div class="btn-wrap">
      <button class="emoji-rain-btn" data-emojis="🔥,😍">Emoji Rain 🔥 + 😍</button>
      <button class="emoji-rain-btn" data-emojis="👎,😔">Thumbs Down &amp; Shame 👎</button>
    </div>
    <p class="hint">Click a button to trigger</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script>
    let running = false;

    function triggerRain(emojiList) {
      if (running) return;
      running = true;

      const container = document.getElementById('emoji-rain-container');
      const H = window.innerHeight;
      const W = window.innerWidth;
      const count = 50;
      const spawned = [];

      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'rain-emoji';
        el.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];

        const x = Math.random() * W;
        const scale = 0.4 + Math.random() * 0.7;
        const delay = Math.random() * 1.2;
        const dur = 0.5 + Math.random() * 1.0;
        const sway = 20 + Math.random() * 30;
        const rot = (Math.random() - 0.5) * 30;

        gsap.set(el, { x, y: H + 60, scale, rotate: rot, xPercent: -50 });
        container.appendChild(el);
        spawned.push(el);

        // Rise up
        gsap.to(el, {
          y: -120,
          duration: dur,
          delay,
          ease: 'power1.in',
        });

        // Sway side to side
        gsap.to(el, {
          x: x + (Math.random() > 0.5 ? sway : -sway),
          duration: 0.7,
          delay,
          ease: 'sine.inOut',
          repeat: Math.ceil(dur / 0.7),
          yoyo: true,
        });
      }

      setTimeout(() => {
        spawned.forEach(el => el.remove());
        running = false;
      }, 2800);
    }

    document.querySelectorAll('[data-emojis]').forEach(btn => {
      btn.addEventListener('click', () => {
        const list = btn.getAttribute('data-emojis').split(',');
        triggerRain(list);
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
