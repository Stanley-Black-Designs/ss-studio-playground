<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Rain Effect — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#b8c4e0;font-family:'Inter',sans-serif;padding-top:50px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .demo-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5em;padding:40px 24px}
    .emoji-rain-container{z-index:150;pointer-events:none;user-select:none;-webkit-user-select:none;position:fixed;inset:0%;overflow:hidden}
    .single-rain-emoji{will-change:transform;width:max(120px,10vw);position:absolute}
    .single-rain-emoji.hidden{opacity:0}
    .single-rain-emoji-image-fire{background-image:url('https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a6d8c43f15d1a8d8d8b33_icon-3d-fire.png');background-position:50%;background-size:cover;width:100%;padding-top:100%}
    .single-rain-emoji-image-love{background-image:url('https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a6d8cd2f2b4a0c0c8c3c4_icon-3d-love.png');background-position:50%;background-size:cover;width:100%;padding-top:100%}
    .single-rain-emoji-image-shame{background-image:url('https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a6d8cd2f2b4a0c0c8c3c5_icon-3d-shame.png');background-position:50%;background-size:cover;width:100%;padding-top:100%}
    .single-rain-emoji-image-thumbs-down{background-image:url('https://cdn.prod.website-files.com/681a615bf5a0f1ba3cb1ca38/681a6d8c43f15d1a8d8d8b34_icon-3d-thumbsup.png');background-position:50%;background-size:cover;width:100%;padding-top:100%;rotate:180deg}
    /* Fallback: use emoji text if images fail */
    .emoji-fallback-fire::before{content:'🔥';font-size:80px;display:block}
    .emoji-fallback-love::before{content:'😍';font-size:80px;display:block}
    .emoji-fallback-shame::before{content:'😔';font-size:80px;display:block}
    .emoji-fallback-thumbs::before{content:'👎';font-size:80px;display:block}
    .btn-wrap{gap:1.5em;flex-flow:column;align-items:center;display:flex}
    .emoji-rain-btn{gap:.125em;cursor:pointer;background-color:#fff;border-radius:10em;align-items:center;padding:.5em .75em .5em 1em;font-family:'Inter',sans-serif;font-size:clamp(1.2em,3vw,2em);font-weight:700;color:#1a1240;transition:transform .3s cubic-bezier(.45,.422,.269,1.702);display:flex;transform:scale(1) rotate(.001deg);border:none;user-select:none}
    .emoji-rain-btn:hover{transform:scale(1.05) rotate(.001deg)}
    .hint{color:rgba(26,18,64,0.45);font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin-top:8px}
  </style>
</head>
<body>
  <div class="demo-chrome" style="background:rgba(184,196,224,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.08);">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(26,18,64,0.55);"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep" style="background:rgba(0,0,0,0.12);"></div>
      <span class="demo-chrome__title" style="color:#1a1240;">Emoji Rain Effect</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>

  <div data-emoji-rain-container class="emoji-rain-container">
    <div class="single-rain-emoji hidden">
      <div class="single-rain-emoji-image-fire"></div>
      <div class="single-rain-emoji-image-love"></div>
      <div class="single-rain-emoji-image-shame"></div>
      <div class="single-rain-emoji-image-thumbs-down"></div>
    </div>
  </div>

  <div class="demo-stage">
    <div class="btn-wrap">
      <div data-emoji-rain-type-1="fire" data-emoji-rain-type-2="love" class="emoji-rain-btn">Emoji Rain 🔥 + 😍</div>
      <div data-emoji-rain-type-1="thumbs-down" data-emoji-rain-type-2="shame" class="emoji-rain-btn">Thumbs Down & Shame 👎</div>
    </div>
    <p class="hint">Click a button to trigger</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script>
    let emojiAnimationRunning=false;
    function initEmojiRain(emojiTypes,emojiContainer){if(emojiAnimationRunning)return;emojiAnimationRunning=true;const emojiContainerHeight=emojiContainer.offsetHeight;const emojiQuantity=60;const getRandomInt=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;const createEmojiElement=()=>{const emojiScale=Math.random()*0.6+0.4;const emojiRotate=getRandomInt(1,5);const emojiDelay=0.001*getRandomInt(0,1250);const emojiSpeed=getRandomInt(500,1500)*0.001;const emojiPosition=`${getRandomInt(0,10)}0%`;const emojiClass=`single-rain-emoji-image-${emojiTypes[Math.floor(Math.random()*emojiTypes.length)]}`;const singleEmoji=document.createElement("div");singleEmoji.className="single-rain-emoji append";singleEmoji.style.left=emojiPosition;const singleEmojiChild=document.createElement("div");singleEmojiChild.className=emojiClass;singleEmoji.appendChild(singleEmojiChild);gsap.fromTo(singleEmoji,{y:emojiContainerHeight,xPercent:-50,rotate:0.001,scale:emojiScale},{y:"-100%",xPercent:-50,rotate:0.001,delay:emojiDelay,ease:"Power1.easeIn",duration:emojiSpeed});gsap.fromTo(singleEmojiChild,{xPercent:-25,rotate:emojiRotate},{xPercent:25,rotate:-emojiRotate,ease:"Power1.easeInOut",delay:emojiDelay,duration:0.8,repeat:-1,yoyo:true});emojiContainer.appendChild(singleEmoji);};Array.from({length:emojiQuantity}).forEach(createEmojiElement);setTimeout(()=>{emojiContainer.querySelectorAll(".single-rain-emoji.append").forEach(el=>el.remove());emojiAnimationRunning=false;},2750);}
    function initEmojiRainActions(){document.querySelectorAll("[data-emoji-rain-type-1]").forEach(trigger=>{trigger.addEventListener("click",()=>{const type1=trigger.getAttribute("data-emoji-rain-type-1");const type2=trigger.getAttribute("data-emoji-rain-type-2")||type1;const emojiContainer=document.querySelector("[data-emoji-rain-container]");if(!emojiContainer)return;initEmojiRain([type1,type2],emojiContainer);});});}
    document.addEventListener('DOMContentLoaded',()=>{initEmojiRainActions();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
