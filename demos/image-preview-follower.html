<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Preview Cursor Follower — Stanley Smith Studios</title>
  <link rel="stylesheet" href="demo-chrome.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f0;
      color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      font-size: 16px;
    }

    .page-wrap {
      padding-top: 80px;
      padding-bottom: 8em;
    }

    .preview-container {
      width: 100%;
      max-width: 76em;
      margin-left: auto;
      margin-right: auto;
      padding-left: 2em;
      padding-right: 2em;
    }

    .preview-collection {
      width: 100%;
      margin-top: .5em;
    }

    .preview-item__row {
      flex-flow: wrap;
      justify-content: flex-start;
      align-items: center;
      width: 100%;
      display: flex;
    }

    .preview-item__col {
      flex: 1;
    }

    .preview-item__col.is--large {
      max-width: 45%;
    }

    .preview-item__col.is--medium {
      max-width: 25%;
    }

    .preview-item__col.is--small {
      max-width: 15%;
    }

    .preview-container__label {
      color: #0a0a0a80;
      text-transform: uppercase;
      font-size: .75em;
    }

    .preview-list {
      flex-flow: column;
      width: 100%;
      display: flex;
      position: relative;
    }

    .preview-item {
      width: 100%;
      transition: opacity .2s;
    }

    .preview-item__heading {
      margin-top: 0;
      margin-bottom: 0;
      font-size: 3.5em;
      font-weight: 400;
      line-height: 1;
    }

    .preview-item__text {
      margin-bottom: 0;
      font-size: 1.25em;
      font-weight: 400;
      line-height: 1.2;
    }

    .preview-item__visual {
      aspect-ratio: 1 / 1.25;
      width: 20em;
      display: none;
      position: absolute;
      overflow: hidden;
    }

    .preview-follower [data-follower-visual] {
      display: block;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .preview-item__inner {
      border-top: 1px solid #00000040;
      width: 100%;
      padding-top: 2.5em;
      padding-bottom: 2.5em;
    }

    .preview-item__visual-img {
      object-fit: cover;
      width: 100%;
      height: 100%;
    }

    .preview-follower {
      z-index: 100;
      aspect-ratio: 1 / 1.25;
      pointer-events: none;
      border-radius: .75em;
      justify-content: center;
      align-items: center;
      width: 20em;
      display: flex;
      position: fixed;
      inset: 0% auto auto 0%;
      overflow: hidden;
    }

    .preview-follower__label {
      z-index: 2;
      position: absolute;
      opacity: 0;
      transform: translate(0px, 100%);
      transition: opacity 0.1s ease, transform 0.6s cubic-bezier(0.65, 0.1, 0, 1);
    }

    .preview-follower__label-span {
      background-color: #fff;
      border-radius: .25em;
      padding: .75em 1.25em;
      font-size: 1em;
    }

    .preview-follower__inner {
      z-index: 2;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.1s ease, transform 0.6s cubic-bezier(0.65, 0.1, 0, 1);
    }

    @media screen and (min-width: 992px) {
      .preview-item:last-of-type {
        border-bottom: 1px solid rgba(0, 0, 0, 0.25);
      }
    }

    @media (hover: hover) and (min-width: 992px) {
      body:has([data-follower-collection]:hover) .preview-follower__inner {
        opacity: 1;
        transform: scale(1);
      }
      body:has([data-follower-collection]:hover) .preview-follower__label {
        opacity: 1;
        transform: translate(0px, 0%);
      }
      body:has(.preview-item:hover) .preview-item:not(:hover) {
        opacity: 0.5;
      }
    }

    @media screen and (max-width: 991px) {
      .preview-item__row {
        grid-row-gap: .5em;
      }

      .preview-item__row.tablet--hide {
        display: none;
      }

      .preview-item__col.is--large {
        flex: none;
        order: -1;
        width: 100%;
        max-width: none;
      }

      .preview-item__col.is--medium {
        order: -1;
        max-width: 80%;
      }

      .preview-item__col.is--small {
        text-align: right;
        max-width: 20%;
      }

      .preview-item__col.is--small.tablet--hide {
        display: none;
      }

      .preview-list {
        grid-column-gap: 1em;
        grid-row-gap: 4em;
        flex-flow: wrap;
      }

      .preview-item {
        width: calc(50% - .5em);
      }

      .preview-item__heading {
        font-size: 2em;
      }

      .preview-item__visual {
        border-radius: .75em;
        order: -1;
        width: 100%;
        margin-bottom: 1em;
        display: block;
        position: relative;
      }

      .preview-item__inner {
        border: 1px #000;
        flex-flow: column;
        padding-top: 0;
        padding-bottom: 0;
        display: flex;
      }

      .preview-follower {
        display: none;
      }
    }

    @media screen and (max-width: 767px) {
      .preview-container {
        padding-left: 1em;
        padding-right: 1em;
      }

      .preview-list {
        grid-row-gap: 3em;
      }

      .preview-item {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

  <script>
    function initPreviewFollower() {
      const wrappers = document.querySelectorAll('[data-follower-wrap]');

      wrappers.forEach(wrap => {
        const collection = wrap.querySelector('[data-follower-collection]');
        const items = wrap.querySelectorAll('[data-follower-item]');
        const follower = wrap.querySelector('[data-follower-cursor]');
        const followerInner = wrap.querySelector('[data-follower-cursor-inner]');

        let prevIndex = null;
        let firstEntry = true;

        const offset = 100;
        const duration = 0.5;
        const ease = 'power2.inOut';

        gsap.set(follower, { xPercent: -50, yPercent: -50 });

        const xTo = gsap.quickTo(follower, 'x', { duration: 0.6, ease: 'power3' });
        const yTo = gsap.quickTo(follower, 'y', { duration: 0.6, ease: 'power3' });

        window.addEventListener('mousemove', e => {
          xTo(e.clientX);
          yTo(e.clientY);
        });

        items.forEach((item, index) => {
          item.addEventListener('mouseenter', () => {
            const forward = prevIndex === null || index > prevIndex;
            prevIndex = index;

            follower.querySelectorAll('[data-follower-visual]').forEach(el => {
              gsap.killTweensOf(el);
              gsap.to(el, {
                yPercent: forward ? -offset : offset,
                duration,
                ease,
                overwrite: 'auto',
                onComplete: () => el.remove()
              });
            });

            const visual = item.querySelector('[data-follower-visual]');
            if (!visual) return;
            const clone = visual.cloneNode(true);
            followerInner.appendChild(clone);

            if (!firstEntry) {
              gsap.fromTo(clone,
                { yPercent: forward ? offset : -offset },
                { yPercent: 0, duration, ease, overwrite: 'auto' }
              );
            } else {
              firstEntry = false;
            }
          });

          item.addEventListener('mouseleave', () => {
            const el = follower.querySelector('[data-follower-visual]');
            if (!el) return;
            gsap.killTweensOf(el);
            gsap.to(el, {
              yPercent: -offset,
              duration,
              ease,
              overwrite: 'auto',
              onComplete: () => el.remove()
            });
          });
        });

        collection.addEventListener('mouseleave', () => {
          follower.querySelectorAll('[data-follower-visual]').forEach(el => {
            gsap.killTweensOf(el);
            gsap.delayedCall(duration, () => el.remove());
          });
          firstEntry = true;
          prevIndex = null;
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      initPreviewFollower();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
