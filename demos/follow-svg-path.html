<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow SVG Path on Scroll — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#ede9e3;color:#131313;font-family:'Inter',sans-serif;padding-top:50px;-webkit-font-smoothing:antialiased}
    .motionpath-wrap{width:100%;height:450vh;position:relative;overflow:clip}
    .motionpath-content{justify-content:center;align-items:center;width:100%;height:100vh;display:flex;position:sticky;top:0}
    .motionpath-content-inner{justify-content:flex-start;align-items:center;width:100%;height:100%;display:flex}
    .motionpath-content-path{width:100vmax;height:100%;max-height:45vh}
    .motionpath-svg{justify-content:center;align-items:center;width:100%;height:100%}
    .motionpath-content-wrap{z-index:1;position:absolute}
    .motionpath-content-item{gap:2em;justify-content:flex-start;align-items:flex-start;display:flex;position:absolute}
    .motionpath-content-item__visual{aspect-ratio:1/1.5;border-radius:.75em;flex:none;width:max(24vw,12rem);overflow:hidden}
    .motionpath-content-item__img{object-fit:cover;width:100%;height:100%}
    .motionpath-content-item__details{gap:.75em;white-space:nowrap;flex-flow:column;justify-content:flex-end;align-items:flex-start;padding-top:2em;display:flex}
    .motionpath-content-item__title{margin:0;font-size:2em;font-weight:500;line-height:1}
    .motionpath-content-item__label{color:#13131399;background-color:#fff;border-radius:100em;padding:.5em .75em;font-size:.75em;font-weight:500;line-height:1.2}
    .motionpath-content-title{z-index:0;color:#1313130f;margin:0;font-family:'Inter',sans-serif;font-size:30vw;font-weight:700;line-height:.8;position:absolute;letter-spacing:-.04em}
    @media (max-width:767px){.motionpath-content-inner{justify-content:flex-start;align-items:flex-start}.motionpath-content-path{max-height:70vh}.motionpath-content-item{gap:1em}.motionpath-content-item__details{gap:.5em;padding-top:1em}.motionpath-content-item__title{font-size:1.25em}.motionpath-content-item__label{font-size:.625em}}
  </style>
</head>
<body>
  <div class="demo-chrome" style="background:rgba(237,233,227,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.1);">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(19,19,19,0.5);"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep" style="background:rgba(0,0,0,0.12);"></div>
      <span class="demo-chrome__title" style="color:#131313;">Follow SVG Path on Scroll</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>

  <div data-motionpath="wrap" class="motionpath-wrap">
    <div class="motionpath-content">
      <h1 class="motionpath-content-title">SPACES</h1>
      <div class="motionpath-content-inner">
        <div class="motionpath-content-path">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1366 603" fill="transparent" preserveAspectRatio="none" class="motionpath-svg">
            <path data-motionpath="path" d="M1115.94 0C1297.33 38.9693 1626.89 444.65 993.816 562.057C407.372 670.816 89.0772 533.413 0 436.157" stroke="transparent"></path>
          </svg>
        </div>
        <div class="motionpath-content-wrap">
          <div class="motionpath-content-list">
            <div data-motionpath="item" class="motionpath-content-item"><div class="motionpath-content-item__visual"><img src="https://cdn.prod.website-files.com/684fe83006c8046ffc2d3616/685bbbdbe72f870106909210_Minimalist%20Terracotta%20Room.avif" class="motionpath-content-item__img"></div><div data-motionpath="item-details" class="motionpath-content-item__details"><span class="motionpath-content-item__label">Image 001</span><h3 class="motionpath-content-item__title">Master bedroom</h3></div></div>
            <div data-motionpath="item" class="motionpath-content-item"><div class="motionpath-content-item__visual"><img src="https://cdn.prod.website-files.com/684fe83006c8046ffc2d3616/685bbbdb2a4dda2ba7fc3147_Terracotta%20Dining%20Room.avif" class="motionpath-content-item__img"></div><div data-motionpath="item-details" class="motionpath-content-item__details"><span class="motionpath-content-item__label">Image 002</span><h3 class="motionpath-content-item__title">Dining room</h3></div></div>
            <div data-motionpath="item" class="motionpath-content-item"><div class="motionpath-content-item__visual"><img src="https://cdn.prod.website-files.com/684fe83006c8046ffc2d3616/685bbbdbe72f870106909213_Terracotta%20Kitchen%20Design.avif" class="motionpath-content-item__img"></div><div data-motionpath="item-details" class="motionpath-content-item__details"><span class="motionpath-content-item__label">Image 003</span><h3 class="motionpath-content-item__title">Open kitchen</h3></div></div>
            <div data-motionpath="item" class="motionpath-content-item"><div class="motionpath-content-item__visual"><img src="https://cdn.prod.website-files.com/684fe83006c8046ffc2d3616/685bbbde57b0bf84b0d815c1_Luxurious%20Terracotta%20Bathroom.avif" class="motionpath-content-item__img"></div><div data-motionpath="item-details" class="motionpath-content-item__details"><span class="motionpath-content-item__label">Image 004</span><h3 class="motionpath-content-item__title">Spacious bathroom</h3></div></div>
            <div data-motionpath="item" class="motionpath-content-item"><div class="motionpath-content-item__visual"><img src="https://cdn.prod.website-files.com/684fe83006c8046ffc2d3616/685bbbdbdfeae088022b8ee7_Minimalist%20Terracotta%20Room%20(1).avif" class="motionpath-content-item__img"></div><div data-motionpath="item-details" class="motionpath-content-item__details"><span class="motionpath-content-item__label">Image 005</span><h3 class="motionpath-content-item__title">Terrace</h3></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/MotionPathPlugin.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger,MotionPathPlugin);
    function initImagesOnPathScroll(){const wrap=document.querySelector('[data-motionpath="wrap"]');const path=wrap.querySelector('[data-motionpath="path"]');const items=wrap.querySelectorAll('[data-motionpath="item"]');const itemDetails=wrap.querySelectorAll('[data-motionpath="item-details"]');gsap.set(items,{zIndex:(i,target,all)=>all.length-i});const oldTl=initImagesOnPathScroll.tl;let progress=0;if(oldTl){progress=oldTl.progress();oldTl.progress(0).kill();}const tl=gsap.timeline({scrollTrigger:{trigger:wrap,start:'top top',end:'bottom bottom',scrub:true},defaults:{ease:'none',stagger:0.3}});tl.to(items,{duration:1,motionPath:{path,align:path,curviness:2,alignOrigin:[0.5,0.5]}}).fromTo(items,{autoAlpha:0},{autoAlpha:1,duration:0.1},0).fromTo(items,{filter:'blur(1.5em)'},{filter:'blur(0em)',duration:0.5},0).fromTo(itemDetails,{autoAlpha:0,yPercent:25},{autoAlpha:1,yPercent:0,duration:0.1},0.5).fromTo(items,{scale:0.4},{scale:1,duration:0.65},0).to(items,{autoAlpha:0,filter:'blur(1em)',duration:0.15},0.85).to(itemDetails,{autoAlpha:0,duration:0.05},0.9);tl.progress(progress);ScrollTrigger.refresh();initImagesOnPathScroll.tl=tl;if(!initImagesOnPathScroll.resizeHandler){initImagesOnPathScroll.resizeHandler=debounce(()=>{initImagesOnPathScroll();},200);window.addEventListener('resize',initImagesOnPathScroll.resizeHandler);}return tl;}
    function debounce(fn,delay=200){let timeout;return()=>{clearTimeout(timeout);timeout=setTimeout(fn,delay);};}
    document.addEventListener("DOMContentLoaded",()=>{initImagesOnPathScroll();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
