<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Cards Slider — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#2a1245;font-family:'Inter',sans-serif;padding-top:50px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .demo-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .stack-cards{width:25em;position:relative}
    .stacked-cards__stack{z-index:0;width:100%;position:relative}
    .stack-cards__before{padding-top:117.5%}
    .stacked-cards__collection{width:100%;height:100%;position:absolute;top:0;left:0}
    .stack-cards__list{width:100%;height:100%;position:absolute;top:0;left:0}
    .stack-cards__item{width:100%;height:100%;position:absolute;top:0;left:0}
    .stack-cards__card{transition:box-shadow 0.25s cubic-bezier(0.625,0.05,0,1);background-color:#fff;border:.1875em solid #121212;border-radius:1.6em;width:100%;height:100%;position:absolute;top:0;left:0;overflow:hidden;box-shadow:0em 0.5em 0em 0em rgba(0,0,0,0)}
    .stack-cards__item.is--active .stack-cards__card,.stack-cards__item.is--second .stack-cards__card{box-shadow:0em 0.5em 0em 0em rgba(0,0,0,0.15)}
    .stack-cards__card-image{pointer-events:none;object-fit:cover;user-select:none;-webkit-user-select:none;border-radius:0.7em;width:calc(100% - 1.8em);height:calc(100% - 4.5em);position:absolute;top:0.9em;left:0.9em}
    .stacked-cards__controls{z-index:1;gap:.75em;flex-flow:column;justify-content:center;align-items:center;margin-top:-1.5em;display:flex;position:relative}
    .shuffle-btn{gap:.375em;color:#121212;background-color:#b9baf7;border-radius:10em;flex:0 auto;justify-content:center;align-items:center;height:2.75em;padding-left:1.25em;padding-right:1.5em;font-size:1.25em;font-weight:400;line-height:1;text-decoration:none;display:flex;position:relative;border:none;cursor:pointer}
    .shuffle-btn__span{white-space:nowrap;margin-top:.0625em;font-size:1.0625em;font-weight:500}
    .shuffle-btn__icon-svg{width:1em}
    @media (max-width:480px){.stack-cards{width:18em}}
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Stacked Cards Slider</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-chrome-mobile-cta">
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Have a project in mind?</a>
  </div>

  <div class="demo-stage">
    <div data-stacked-cards="" class="stack-cards">
      <div class="stacked-cards__stack">
        <div class="stack-cards__before"></div>
        <div class="stacked-cards__collection">
          <div data-stacked-cards-list="" class="stack-cards__list">
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154ab4df57dbdfedd7df_Pastel%20Green%20Bottle.avif" class="stack-cards__card-image"></div></div>
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154a04f42a8d992bede9_Soap%20Bar%20in%20Green%20Foam.avif" class="stack-cards__card-image"></div></div>
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154ac758e72eef2c32d0_Minimalist%20Bottle%20Design.avif" class="stack-cards__card-image"></div></div>
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154ab342b4ad9b8f9c5e_Luxurious%20Cream%20Jar.avif" class="stack-cards__card-image"></div></div>
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154af7aed218580948a8_Pastel%20Cosmetic%20Display.avif" class="stack-cards__card-image"></div></div>
            <div data-stacked-cards-item="" class="stack-cards__item"><div data-stacked-cards-card="" class="stack-cards__card"><img width="540" loading="lazy" alt="" src="https://cdn.prod.website-files.com/68400ee0c3a4136811a2c90c/6840154ae4b3d097e13b2343_Gray%20Spray%20Bottle%20Display.avif" class="stack-cards__card-image"></div></div>
          </div>
        </div>
      </div>
      <div class="stacked-cards__controls">
        <button data-stacked-cards-control="next" class="shuffle-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 24 24" fill="none" class="shuffle-btn__icon-svg"><path d="M1 4V10H7" stroke="currentColor" stroke-width="2"></path><path d="M23 20V14H17" stroke="currentColor" stroke-width="2"></path><path d="M20.5 8.99998C19.6855 6.75968 18.0244 4.92842 15.8739 3.89992C13.7235 2.87143 11.2553 2.72782 9 3.49998C7.7459 3.98238 6.59283 4.69457 5.6 5.59998L1 9.99998M23 14L18.4 18.4C16.6963 20.0855 14.3965 21.0308 12 21.0308C9.60347 21.0308 7.30368 20.0855 5.6 18.4C4.69459 17.4072 3.9824 16.2541 3.5 15" stroke="currentColor" stroke-width="2"></path></svg>
          <span class="shuffle-btn__span">Shuffle</span>
        </button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Draggable.min.js"></script>
  <script>
    gsap.registerPlugin(Draggable);
    function initStackedCardsSlider(){document.querySelectorAll('[data-stacked-cards]').forEach(function(container){let easeBeforeRelease={duration:0.2,ease:'Power2.easeOut'};let easeAfterRelease={duration:1,ease:'elastic.out(1,0.75)'};let activeDeg=4;let inactiveDeg=-4;const list=container.querySelector('[data-stacked-cards-list]');if(!list)return;const initialItems=Array.from(list.querySelectorAll(':scope > [data-stacked-cards-item]'));if(initialItems.length<3){return;}let dragFirst,dragSecond;let firstItem,secondItem,firstEl,secondEl;let full,t;function restack(){const items=Array.from(list.querySelectorAll('[data-stacked-cards-item]'));items.forEach(function(item){item.classList.remove('is--active','is--second');});items[0].style.zIndex=3;items[0].style.transform=`rotate(${activeDeg}deg)`;items[0].style.pointerEvents='auto';items[0].classList.add('is--active');items[1].style.zIndex=2;items[1].style.transform=`rotate(${inactiveDeg}deg)`;items[1].style.pointerEvents='none';items[1].classList.add('is--second');items[2].style.zIndex=1;items[2].style.transform=`rotate(${activeDeg}deg)`;items.slice(3).forEach(function(item){item.style.zIndex=0;item.style.transform=`rotate(${inactiveDeg}deg)`;});}
    function setupDraggables(){restack();const items=Array.from(list.querySelectorAll(':scope > [data-stacked-cards-item]'));firstItem=items[0];secondItem=items[1];firstEl=firstItem.querySelector('[data-stacked-cards-card]');secondEl=secondItem.querySelector('[data-stacked-cards-card]');const width=firstEl.getBoundingClientRect().width;full=width*1.15;t=width*0.1;dragFirst?.kill();dragSecond?.kill();dragFirst=Draggable.create(firstEl,{type:'x',onPress(){firstEl.classList.add('is--dragging');},onRelease(){firstEl.classList.remove('is--dragging');},onDrag(){let raw=this.x;if(Math.abs(raw)>full){const over=Math.abs(raw)-full;raw=(raw>0?1:-1)*(full+over*0.1);}gsap.set(firstEl,{x:raw,rotation:0});},onDragEnd(){const x=this.x;const dir=x>0?'right':'left';this.disable?.();dragSecond?.enable?.();firstItem.style.pointerEvents='none';secondItem.style.pointerEvents='auto';if(Math.abs(x)<=t){gsap.to(firstEl,{x:0,rotation:0,...easeBeforeRelease,onComplete:resetCycle});}else if(Math.abs(x)<=full){flick(dir,false,x);}else{flick(dir,true);}}})[0];dragSecond=Draggable.create(secondEl,{type:'x',onPress(){secondEl.classList.add('is--dragging');},onRelease(){secondEl.classList.remove('is--dragging');},onDrag(){let raw=this.x;if(Math.abs(raw)>full){const over=Math.abs(raw)-full;raw=(raw>0?1:-1)*(full+over*0.2);}gsap.set(secondEl,{x:raw,rotation:0});},onDragEnd(){gsap.to(secondEl,{x:0,rotation:0,...easeBeforeRelease});}})[0];dragFirst?.enable?.();dragSecond?.disable?.();firstItem.style.pointerEvents='auto';secondItem.style.pointerEvents='none';}
    function flick(dir,skipHome=false,releaseX=0){if(!(dir==='left'||dir==='right')){dir=activeDeg>0?'right':'left';}dragFirst?.disable?.();const item=list.querySelector('[data-stacked-cards-item]');const card=item.querySelector('[data-stacked-cards-card]');const exitX=dir==='right'?full:-full;if(skipHome){const visualX=gsap.getProperty(card,'x');list.appendChild(item);[activeDeg,inactiveDeg]=[inactiveDeg,activeDeg];restack();gsap.fromTo(card,{x:visualX,rotation:0},{x:0,rotation:0,...easeAfterRelease,onComplete:resetCycle});}else{gsap.fromTo(card,{x:releaseX,rotation:0},{x:exitX,...easeBeforeRelease,onComplete(){gsap.set(card,{x:0,rotation:0});list.appendChild(item);[activeDeg,inactiveDeg]=[inactiveDeg,activeDeg];resetCycle();const newCard=item.querySelector('[data-stacked-cards-card]');gsap.fromTo(newCard,{x:exitX},{x:0,...easeAfterRelease,onComplete:resetCycle});}});}}
    function resetCycle(){list.querySelectorAll('[data-stacked-cards-card].is--dragging').forEach(function(el){el.classList.remove('is--dragging');});setupDraggables();}
    setupDraggables();container.querySelectorAll('[data-stacked-cards-control="next"]').forEach(function(btn){btn.onclick=function(){flick();};});});}
    document.addEventListener("DOMContentLoaded",()=>{initStackedCardsSlider();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
