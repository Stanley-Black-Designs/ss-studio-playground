<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Image Layers — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#f0f0f2;font-family:'Inter',sans-serif;padding-top:50px;-webkit-font-smoothing:antialiased}
    .parallax{width:100%;position:relative;overflow:hidden}
    .parallax__content{padding:10em 1em;justify-content:center;align-items:center;min-height:100svh;display:flex;position:relative}
    .parallax__content-inner{text-align:center;max-width:600px}
    .parallax__content h2{font-size:clamp(32px,4vw,52px);font-weight:500;line-height:1.1;letter-spacing:-.02em;margin-bottom:1em}
    .parallax__content p{font-size:1.125em;font-weight:300;opacity:.6;line-height:1.65;max-width:480px;margin:0 auto}
    .parallax__layers{object-fit:cover;width:100%;max-width:none;height:100%;position:absolute;top:0;left:0;overflow:hidden}
    .parallax__title{pointer-events:auto;text-align:center;margin:0 0 .1em .075em;font-size:clamp(60px,10vw,10em);font-weight:700;line-height:1;position:relative}
    .parallax__black-line-overflow{z-index:20;background-color:#000;width:100%;height:2px;position:absolute;bottom:-1px;left:0}
    .parallax__layer-img{pointer-events:none;object-fit:cover;width:100%;max-width:none;height:117.5%;position:absolute;top:-17.5%;left:0}
    .parallax__fade{z-index:30;background-image:linear-gradient(transparent,#000);width:100%;max-width:none;height:20%;position:absolute;bottom:0;left:0}
    .parallax__header{z-index:2;padding:10em 1em;justify-content:center;align-items:center;min-height:100svh;display:flex;position:relative}
    .parallax__visuals{object-fit:cover;width:100%;max-width:none;height:120%;position:absolute;top:0;left:0}
    .parallax__layer-title{justify-content:center;align-items:center;width:100%;height:100svh;display:flex;position:absolute;top:0;left:0}
    .scroll-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(240,240,242,0.3);pointer-events:none;z-index:50}
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Parallax Image Layers</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-chrome-mobile-cta">
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Have a project in mind?</a>
  </div>


  <div class="parallax">
    <section class="parallax__header">
      <div class="parallax__visuals">
        <div class="parallax__black-line-overflow"></div>
        <div data-parallax-layers class="parallax__layers">
          <img src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795be09b462b2e8ebf71_osmo-parallax-layer-3.webp" loading="eager" width="800" data-parallax-layer="1" alt="" class="parallax__layer-img">
          <img src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795b4d5ac529e7d3a562_osmo-parallax-layer-2.webp" loading="eager" width="800" data-parallax-layer="2" alt="" class="parallax__layer-img">
          <div data-parallax-layer="3" class="parallax__layer-title"><h2 class="parallax__title">Parallax</h2></div>
          <img src="https://cdn.prod.website-files.com/671752cd4027f01b1b8f1c7f/6717795bb5aceca85011ad83_osmo-parallax-layer-1.webp" loading="eager" width="800" data-parallax-layer="4" alt="" class="parallax__layer-img">
        </div>
        <div class="parallax__fade"></div>
      </div>
    </section>
    <section class="parallax__content">
      <div class="parallax__content-inner">
        <h2>Layers in motion</h2>
        <p>Each image layer scrolls at a different speed, creating a sense of depth and perspective that turns a static scene into something cinematic.</p>
      </div>
    </section>
  </div>
  <p class="scroll-hint">↓ Scroll to see the parallax</p>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    function initParallaxLayers(){document.querySelectorAll('[data-parallax-layers]').forEach(triggerElement=>{let tl=gsap.timeline({scrollTrigger:{trigger:triggerElement,start:"0% 0%",end:"100% 0%",scrub:0}});const layers=[{layer:"1",yPercent:70},{layer:"2",yPercent:55},{layer:"3",yPercent:40},{layer:"4",yPercent:10}];layers.forEach((layerObj,idx)=>{tl.to(triggerElement.querySelectorAll(`[data-parallax-layer="${layerObj.layer}"]`),{yPercent:layerObj.yPercent,ease:"none"},idx===0?undefined:"<");});});}
    document.addEventListener('DOMContentLoaded',()=>{initParallaxLayers();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
