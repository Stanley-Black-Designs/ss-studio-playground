<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Scrolling Sections — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', sans-serif; background: #0c0d10; color: #f0f0f2; padding-top: 50px; }
    .demo-header__h1 { letter-spacing: -.04em; margin: 0; font-size: 4em; font-weight: 500; line-height: .95; }
    .horizontal__wrap { flex-flow: row; min-height: 100dvh; display: flex; overflow: hidden; }
    .horizontal__panel { flex: none; width: 100%; }
    .horizontal__panel-inner { width: 100%; height: 100%; padding: 1.25em; }
    .demo-card { border-radius: 1.25em; flex-flow: column; justify-content: flex-end; align-items: flex-start; width: 100%; height: 100%; padding: 3em; display: flex; position: relative; overflow: hidden; }
    .demo-card__bg { z-index: 0; position: absolute; inset: 0%; }
    .demo-card__inner { z-index: 1; position: relative; }
    .demo-card__bg-img { object-fit: cover; width: 100%; height: 100%; }
    @media (max-width:767px) { .demo-header__h1 { font-size: 2.5em; } .horizontal__wrap { flex-flow: column; } .horizontal__panel { height: 30em; } .demo-card { padding: 1.25em; } }
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Horizontal Scrolling Sections</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-chrome-mobile-cta">
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Have a project in mind?</a>
  </div>

  <section class="horizontal__wrap" data-horizontal-scroll-wrap data-horizontal-scroll-disable="mobileLandscape">
    <div data-horizontal-scroll-panel class="horizontal__panel"><div class="horizontal__panel-inner"><div class="demo-card"><div class="demo-card__bg"><img src="https://cdn.prod.website-files.com/68f8bc9dc83dc1aacaa172e7/68f8cf7185c9dcfbedc6d4aa_Dramatic%20Mountain%20Range%20at%20Sunrise.avif" class="demo-card__bg-img"></div><div class="demo-card__inner"><h2 class="demo-header__h1">Dolomites</h2></div></div></div></div>
    <div data-horizontal-scroll-panel class="horizontal__panel"><div class="horizontal__panel-inner"><div class="demo-card"><div class="demo-card__bg"><img src="https://cdn.prod.website-files.com/68f8bc9dc83dc1aacaa172e7/68f8cf71364a2fdf36e25d26_Tranquil%20Dawn%20over%20the%20Pastel%20Peak%20Range.avif" class="demo-card__bg-img"></div><div class="demo-card__inner"><h2 class="demo-header__h1">Patagonia</h2></div></div></div></div>
    <div data-horizontal-scroll-panel class="horizontal__panel"><div class="horizontal__panel-inner"><div class="demo-card"><div class="demo-card__bg"><img src="https://cdn.prod.website-files.com/68f8bc9dc83dc1aacaa172e7/68f8cf712f57198f963fd7eb_Majestic%20Mountain%20Landscape.avif" class="demo-card__bg-img"></div><div class="demo-card__inner"><h2 class="demo-header__h1">Yosemite Park</h2></div></div></div></div>
    <div data-horizontal-scroll-panel class="horizontal__panel"><div class="horizontal__panel-inner"><div class="demo-card"><div class="demo-card__bg"><img src="https://cdn.prod.website-files.com/68f8bc9dc83dc1aacaa172e7/68f8cf71cb5249dc6ea2eb35_Subdued%20Mountain%20Serenity.avif" class="demo-card__bg-img"></div><div class="demo-card__inner"><h2 class="demo-header__h1">Pyrenees</h2></div></div></div></div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    function initHorizontalScrolling(){const mm=gsap.matchMedia();mm.add({isMobile:"(max-width:479px)",isMobileLandscape:"(max-width:767px)",isTablet:"(max-width:991px)",isDesktop:"(min-width:992px)"},(context)=>{const{isMobile,isMobileLandscape,isTablet}=context.conditions;const ctx=gsap.context(()=>{const wrappers=document.querySelectorAll("[data-horizontal-scroll-wrap]");if(!wrappers.length)return;wrappers.forEach(wrap=>{const disable=wrap.getAttribute("data-horizontal-scroll-disable");if((disable==="mobile"&&isMobile)||(disable==="mobileLandscape"&&isMobileLandscape)||(disable==="tablet"&&isTablet))return;const panels=gsap.utils.toArray("[data-horizontal-scroll-panel]",wrap);if(panels.length<2)return;gsap.to(panels,{x:()=>-(wrap.scrollWidth-window.innerWidth),ease:"none",scrollTrigger:{trigger:wrap,start:"top top",end:()=>"+="+(wrap.scrollWidth-window.innerWidth),scrub:true,pin:true,invalidateOnRefresh:true}});});});return()=>ctx.revert();});}
    document.addEventListener("DOMContentLoaded",()=>{initHorizontalScrolling();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
