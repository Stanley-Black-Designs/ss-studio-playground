<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Loading Animation — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0c0d10;font-family:'Inter',sans-serif;overflow:hidden}
    /* Chrome bar sits above everything */
    .demo-chrome{position:fixed;z-index:99999}

    /* ── Loader section ── */
    .stanley-header{color:#f4f4f4;position:relative;overflow:hidden;height:100dvh}
    .stanley-header.is--loading.is--hidden{visibility:hidden}
    .stanley-loader{color:#f4f4f4;justify-content:center;align-items:center;width:100%;height:100%;display:flex;position:absolute;top:0;left:0;overflow:hidden;background:#0c0d10;z-index:2}
    .stanley__h1{white-space:nowrap;justify-content:center;font-size:clamp(48px,10vw,140px);font-weight:500;line-height:.75;display:flex;position:relative}
    .stanley__h1-start{justify-content:flex-end;width:3.4em;display:flex;overflow:hidden}
    .stanley__h1-end{justify-content:flex-start;width:2.1em;display:flex;overflow:hidden}
    .stanley__letter{display:block;position:relative}
    .stanley-loader__box{flex-flow:column;justify-content:center;align-items:center;width:0;display:flex;position:relative}
    .stanley-loader__box-inner{justify-content:center;align-items:center;min-width:1em;height:95%;display:flex;position:relative}
    .stanley__growing-image{justify-content:center;align-items:center;width:0%;height:100%;display:flex;position:absolute;overflow:hidden}
    .stanley__growing-image-wrap{width:100%;min-width:1em;height:100%;position:absolute}
    .stanley__cover-image,.stanley__cover-image-extra{pointer-events:none;object-fit:cover;user-select:none;width:100%;height:100%;position:absolute;top:0;left:0}
    .stanley__cover-image-extra.is--1{z-index:3}
    .stanley__cover-image-extra.is--2{z-index:2}
    .stanley__cover-image-extra.is--3{z-index:1}
    .stanley-header__content{flex-flow:column;justify-content:space-between;align-items:center;width:100%;height:100dvh;padding:calc(50px + 2em) 2em 2em;display:flex;position:relative;z-index:1}
    .stanley-header__top{width:100%;position:relative}
    .stanley-header__bottom{justify-content:flex-start;align-items:flex-end;width:100%;display:flex;position:relative;overflow:hidden}
    .stanley-nav{display:flex;position:relative;overflow:hidden;justify-content:space-between;width:100%}
    .stanley-nav__link{color:inherit;font-size:1em;line-height:1.3;text-decoration:none;position:relative}
    .stanley-nav__links{gap:.5em;display:flex}
    .stanley__h1-bottom{white-space:nowrap;justify-content:flex-start;font-size:clamp(40px,8vw,110px);font-weight:500;line-height:.75;display:flex;position:relative;overflow:hidden}
    .stanley__letter-white{display:block;position:relative;color:#f4f4f4}
    @media (max-width:767px){.stanley__h1{font-size:clamp(32px,8vw,80px)}}
  </style>
</head>
<body>

  <div class="demo-chrome" style="background:transparent;border-bottom-color:transparent;">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(240,240,242,0.5)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</a>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-chrome-mobile-cta">
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Have a project in mind?</a>
  </div>


  <section class="stanley-header is--loading is--hidden">
    <div class="stanley-loader">
      <div class="stanley__h1">
        <div class="stanley__h1-start">
          <span class="stanley__letter">S</span>
          <span class="stanley__letter">t</span>
          <span class="stanley__letter">a</span>
          <span class="stanley__letter">n</span>
          <span class="stanley__letter">l</span>
          <span class="stanley__letter">e</span>
          <span class="stanley__letter">y</span>
        </div>
        <div class="stanley-loader__box">
          <div class="stanley-loader__box-inner">
            <div class="stanley__growing-image">
              <div class="stanley__growing-image-wrap">
                <img class="stanley__cover-image-extra is--1" src="https://cdn.prod.website-files.com/6915bbf51d482439010ee790/6915bc3ac9fe346a924724bc_minimalist-architecture-2.avif" loading="eager" alt="">
                <img class="stanley__cover-image-extra is--2" src="https://cdn.prod.website-files.com/6915bbf51d482439010ee790/6915bc3ac9fe346a924724cf_minimalist-architecture-4.avif" loading="eager" alt="">
                <img class="stanley__cover-image-extra is--3" src="https://cdn.prod.website-files.com/6915bbf51d482439010ee790/6915bc3ac9fe346a924724c5_minimalist-architecture-3.avif" loading="eager" alt="">
                <img class="stanley__cover-image" src="https://cdn.prod.website-files.com/6915bbf51d482439010ee790/6915bc3ac9fe346a924724b0_minimalist-architecture-1.avif" loading="eager" alt="">
              </div>
            </div>
          </div>
        </div>
        <div class="stanley__h1-end">
          <span class="stanley__letter"> </span>
          <span class="stanley__letter">S</span>
          <span class="stanley__letter">m</span>
          <span class="stanley__letter">i</span>
          <span class="stanley__letter">t</span>
          <span class="stanley__letter">h</span>
        </div>
      </div>
    </div>
    <div class="stanley-header__content">
      <div class="stanley-header__top">
        <nav class="stanley-nav">
          <div class="stanley-nav__links">
            <a href="../index.html" class="stanley-nav__link" style="overflow:hidden;display:block"><span style="display:block">Stanley Smith Studios ©</span></a>
          </div>
          <div class="stanley-nav__links">
            <a href="#" class="stanley-nav__link" style="overflow:hidden;display:block"><span style="display:block">Web Design,</span></a>
            <a href="#" class="stanley-nav__link" style="overflow:hidden;display:block"><span style="display:block">SEO,</span></a>
            <a href="#" class="stanley-nav__link" style="overflow:hidden;display:block"><span style="display:block">Motion</span></a>
          </div>
          <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="stanley-nav__link" style="overflow:hidden;display:block"><span style="display:block">Book a call</span></a>
        </nav>
      </div>
      <div class="stanley-header__bottom">
        <div class="stanley__h1-bottom">
          <span class="stanley__letter-white">S</span>
          <span class="stanley__letter-white">t</span>
          <span class="stanley__letter-white">a</span>
          <span class="stanley__letter-white">n</span>
          <span class="stanley__letter-white">l</span>
          <span class="stanley__letter-white">e</span>
          <span class="stanley__letter-white">y</span>
          <span class="stanley__letter-white">&nbsp;</span>
          <span class="stanley__letter-white">S</span>
          <span class="stanley__letter-white">m</span>
          <span class="stanley__letter-white">i</span>
          <span class="stanley__letter-white">t</span>
          <span class="stanley__letter-white">h</span>
          <span class="stanley__letter-white">&nbsp;</span>
          <span class="stanley__letter-white">©</span>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script>
    function initStanleyLoader(){
      const container=document.querySelector(".stanley-header");
      if(!container)return;

      // Force layout visibility so GSAP can measure, but keep visually hidden
      container.style.visibility='hidden';
      container.classList.remove('is--hidden');

      const loadingLetter=container.querySelectorAll(".stanley-loader .stanley__letter");
      const box=container.querySelectorAll(".stanley-loader__box");
      const growingImage=container.querySelectorAll(".stanley__growing-image");
      const headingStart=container.querySelectorAll(".stanley__h1-start");
      const headingEnd=container.querySelectorAll(".stanley__h1-end");
      const coverImageExtra=container.querySelectorAll(".stanley__cover-image-extra");
      const headerLetter=container.querySelectorAll(".stanley__letter-white");
      const navLinks=container.querySelectorAll(".stanley-nav a span");

      // Set initial states while layout is available but element is hidden
      if(loadingLetter.length) gsap.set(loadingLetter,{yPercent:110});
      if(headerLetter.length) gsap.set(headerLetter,{yPercent:110});
      if(navLinks.length) gsap.set(navLinks,{yPercent:110});

      // Unhide — letters are safely tucked away via overflow:hidden parents
      container.style.visibility='';

      const tl=gsap.timeline({defaults:{ease:"expo.inOut"}});
      if(loadingLetter.length)tl.to(loadingLetter,{yPercent:0,stagger:0.025,duration:1.25});
      if(box.length)tl.fromTo(box,{width:"0em"},{width:"1em",duration:1.25},"< 1.25");
      if(growingImage.length)tl.fromTo(growingImage,{width:"0%"},{width:"100%",duration:1.25},"<");
      if(headingStart.length)tl.fromTo(headingStart,{x:"0em"},{x:"-0.05em",duration:1.25},"<");
      if(headingEnd.length)tl.fromTo(headingEnd,{x:"0em"},{x:"0.05em",duration:1.25},"<");
      if(coverImageExtra.length)tl.fromTo(coverImageExtra,{opacity:1},{opacity:0,duration:0.05,ease:"none",stagger:0.5},"-=0.05");
      if(growingImage.length)tl.to(growingImage,{width:"100vw",height:"100dvh",duration:2},"< 1.25");
      if(box.length)tl.to(box,{width:"110vw",duration:2},"<");
      if(headerLetter.length)tl.to(headerLetter,{yPercent:0,duration:1.25,ease:"expo.out",stagger:0.025},"< 1.2");
      if(navLinks.length)tl.to(navLinks,{yPercent:0,duration:1.25,ease:"expo.out",stagger:0.08},"<");
    }
    document.addEventListener('DOMContentLoaded',()=>{initStanleyLoader();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
