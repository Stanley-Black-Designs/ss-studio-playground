<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highlight Marker Text Reveal — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0c0d10;color:#f0f0f2;font-family:'Inter',sans-serif;padding-top:50px;min-height:100dvh}
    .demo-stage{min-height:calc(100dvh - 50px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:80px;padding:80px 40px}
    .highlight-title{text-align:center;letter-spacing:-0.03em;text-transform:uppercase;margin:0;font-family:'Inter',sans-serif;font-size:clamp(36px,6vw,80px);font-weight:900;line-height:0.9}
    [data-highlight-marker-reveal]{visibility:hidden}
    [data-highlight-marker-reveal] .highlight-marker-line{width:auto;display:inline-block!important;margin:-0.055em 0px}
    .highlight-marker-bar{position:absolute;inset:-0.055em 0px;z-index:1;pointer-events:none}
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Highlight Marker Text Reveal</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-stage">
    <h1 data-highlight-marker-reveal data-marker-direction="right" data-marker-theme="#0064E7" class="highlight-title">Here's a text reveal that looks like a highlight marker</h1>
    <h2 data-highlight-marker-reveal data-marker-direction="left" data-marker-theme="#4f8ef7" data-marker-stagger="150" class="highlight-title">Motion that makes an impression</h2>
    <h2 data-highlight-marker-reveal data-marker-direction="right" data-marker-theme="#ffffff" data-marker-stagger-start="end" class="highlight-title">Built for clients who want more</h2>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
  <script>
    function initHighlightMarkerTextReveal(){const defaults={direction:"right",theme:"#0064E7",scrollStart:"top 90%",staggerStart:"start",stagger:100,barDuration:0.6,barEase:"power3.inOut"};const colorMap={pink:"#C700EF",white:"#FFFFFF",blue:"#0064E7"};const directionMap={right:{prop:"scaleX",origin:"right center"},left:{prop:"scaleX",origin:"left center"},up:{prop:"scaleY",origin:"center top"},down:{prop:"scaleY",origin:"center bottom"}};function resolveColor(value){if(colorMap[value])return colorMap[value];if(value.startsWith("--"))return getComputedStyle(document.body).getPropertyValue(value).trim()||value;return value;}function createBar(color,origin){const bar=document.createElement("div");bar.className="highlight-marker-bar";Object.assign(bar.style,{backgroundColor:color,transformOrigin:origin});return bar;}function cleanupElement(el){if(!el._highlightMarkerReveal)return;el._highlightMarkerReveal.timeline?.kill();el._highlightMarkerReveal.scrollTrigger?.kill();el._highlightMarkerReveal.split?.revert();el.querySelectorAll(".highlight-marker-bar").forEach(bar=>bar.remove());delete el._highlightMarkerReveal;}let reduceMotion=false;gsap.matchMedia().add({reduce:"(prefers-reduced-motion: reduce)"},(context)=>{reduceMotion=context.conditions.reduce;});if(reduceMotion){document.querySelectorAll("[data-highlight-marker-reveal]").forEach(el=>{gsap.set(el,{autoAlpha:1});});return;}document.querySelectorAll("[data-highlight-marker-reveal]").forEach(cleanupElement);const elements=document.querySelectorAll("[data-highlight-marker-reveal]");if(!elements.length)return;elements.forEach(el=>{const direction=el.getAttribute("data-marker-direction")||defaults.direction;const theme=el.getAttribute("data-marker-theme")||defaults.theme;const scrollStart=el.getAttribute("data-marker-scroll-start")||defaults.scrollStart;const staggerStart=el.getAttribute("data-marker-stagger-start")||defaults.staggerStart;const staggerOffset=(parseFloat(el.getAttribute("data-marker-stagger"))||defaults.stagger)/1000;const color=resolveColor(theme);const dirConfig=directionMap[direction]||directionMap.right;el._highlightMarkerReveal={};const split=SplitText.create(el,{type:"lines",linesClass:"highlight-marker-line",autoSplit:true,onSplit(self){const instance=el._highlightMarkerReveal;instance.timeline?.kill();instance.scrollTrigger?.kill();el.querySelectorAll(".highlight-marker-bar").forEach(bar=>bar.remove());const lines=self.lines;const tl=gsap.timeline({paused:true});lines.forEach((line,i)=>{gsap.set(line,{position:"relative",overflow:"hidden"});const bar=createBar(color,dirConfig.origin);line.appendChild(bar);const staggerIndex=staggerStart==="end"?lines.length-1-i:i;tl.to(bar,{[dirConfig.prop]:0,duration:defaults.barDuration,ease:defaults.barEase},staggerIndex*staggerOffset);});gsap.set(el,{autoAlpha:1});const st=ScrollTrigger.create({trigger:el,start:scrollStart,once:true,onEnter:()=>tl.play()});instance.timeline=tl;instance.scrollTrigger=st;}});el._highlightMarkerReveal.split=split;});}
    document.addEventListener("DOMContentLoaded",()=>{document.fonts.ready.then(()=>{initHighlightMarkerTextReveal();});});
  </script>
</body>
</html>
