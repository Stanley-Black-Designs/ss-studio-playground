<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacking Sticky Cards (Bounce) — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f0f0;color:#201d1d;font-family:'Inter',sans-serif;padding-top:50px}
    .cards-stack{padding-top:15dvh;padding-bottom:15dvh}
    .container{max-width:90em;margin:0 auto;padding:0 2em}
    .cards-stack__list{gap:5em;flex-flow:column;justify-content:center;align-items:center;width:100%;display:flex}
    .cards-stack__item{flex:none;width:100%;max-width:25em;position:sticky;top:5em}
    .cards-stack-card{aspect-ratio:2/3;background-color:#fff;border-radius:2em;flex-flow:column;justify-content:space-between;width:100%;padding:2.5em;display:flex}
    .cards-stack-card.is--green{background-color:#b1ae91}
    .cards-stack-card.is--dark{color:#fff;background-color:#201d1d}
    .cards-stack-card__number{font-size:6.75em;font-weight:500;line-height:.95}
    .cards-stack-card__h{letter-spacing:-.04em;margin:0;font-size:3.375em;font-weight:600;line-height:.95}
    .cards-stack-card__services{flex-flow:column;justify-content:flex-end;min-height:11em;display:flex}
    .cards-stack-card__services-p{letter-spacing:-.01em;margin-bottom:0;font-size:1.125em;font-weight:500;line-height:1.4}
    @media (max-width:767px){.cards-stack-card{font-size:.8em}}
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Stacking Sticky Cards (Bounce)</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <section data-stacking-cards-init="" data-stacking-cards-desktop="true" data-stacking-cards-tablet="true" data-stacking-cards-mobile="true" data-stacking-cards-desktop-x="-13.75em, 0em, 13em" data-stacking-cards-desktop-y="2.125em, 0em, 4.5em" data-stacking-cards-desktop-rotate="-5, 2, 6" class="cards-stack">
    <div class="container">
      <div class="cards-stack__collection">
        <div data-stacking-card-stack="" class="cards-stack__list">
          <div data-slot-parent="" data-stacking-card="" class="cards-stack__item"><div data-stacking-card-target="" class="cards-stack-card"><div class="cards-stack-card__start"><span class="cards-stack-card__number">1.</span></div><div class="cards-stack-card__end"><h3 class="cards-stack-card__h">Web Design</h3><div class="cards-stack-card__services"><p class="cards-stack-card__services-p">UI/UX Design</p><p class="cards-stack-card__services-p">Motion & Interaction</p><p class="cards-stack-card__services-p">Webflow Development</p></div></div></div></div>
          <div data-slot-parent="" data-stacking-card="" class="cards-stack__item"><div data-stacking-card-target="" class="cards-stack-card is--green"><div class="cards-stack-card__start"><span class="cards-stack-card__number">2.</span></div><div class="cards-stack-card__end"><h3 class="cards-stack-card__h">SEO & Growth</h3><div class="cards-stack-card__services"><p class="cards-stack-card__services-p">Technical SEO</p><p class="cards-stack-card__services-p">Content Strategy</p><p class="cards-stack-card__services-p">AEO / GEO</p></div></div></div></div>
          <div data-slot-parent="" data-stacking-card="" class="cards-stack__item"><div data-stacking-card-target="" class="cards-stack-card is--dark"><div class="cards-stack-card__start"><span class="cards-stack-card__number">3.</span></div><div class="cards-stack-card__end"><h3 class="cards-stack-card__h">CRO & UX</h3><div class="cards-stack-card__services"><p class="cards-stack-card__services-p">Conversion Audits</p><p class="cards-stack-card__services-p">A/B Strategy</p><p class="cards-stack-card__services-p">User Flow Optimisation</p></div></div></div></div>
        </div>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    function initStackingStickyCardsBounce(){const cardsSections=document.querySelectorAll('[data-stacking-cards-init]');const currentTier=getCurrentViewportTier();window.viewportTier=currentTier;ScrollTrigger.getAll().forEach(trigger=>{cardsSections.forEach(section=>{if(section.contains(trigger.trigger))trigger.kill();});});cardsSections.forEach(section=>{section.querySelectorAll('[data-stacking-card-target]').forEach(el=>{gsap.killTweensOf(el);gsap.set(el,{clearProps:'all'});});});cardsSections.forEach(section=>{const tier=currentTier;const isEnabled=(tier==='desktop'&&section.dataset.stackingCardsDesktop==='true')||(tier==='tablet'&&section.dataset.stackingCardsTablet==='true')||((tier==='mobile-portrait'||tier==='mobile-landscape')&&section.dataset.stackingCardsMobile==='true');if(!isEnabled)return;const cards=Array.from(section.querySelectorAll('[data-stacking-card]'));if(!cards.length)return;const stickyTop=parseFloat(getComputedStyle(cards[0]).top)||0;const rotateValues=(()=>{if(tier==='desktop')return parseRotateValues(section,'data-stacking-cards-desktop-rotate');if(tier==='tablet')return parseRotateValues(section,'data-stacking-cards-tablet-rotate');return parseRotateValues(section,'data-stacking-cards-mobile-rotate');})();const xValues=(()=>{if(tier==='desktop')return parseAxisValues(section,'data-stacking-cards-desktop-x');if(tier==='tablet')return parseAxisValues(section,'data-stacking-cards-tablet-x');return parseAxisValues(section,'data-stacking-cards-mobile-x');})();const yValues=(()=>{if(tier==='desktop')return parseAxisValues(section,'data-stacking-cards-desktop-y');if(tier==='tablet')return parseAxisValues(section,'data-stacking-cards-tablet-y');return parseAxisValues(section,'data-stacking-cards-mobile-y');})();cards.forEach((card,index)=>{const targetEl=card.querySelector('[data-stacking-card-target]');if(!targetEl)return;const rotate=rotateValues[index%rotateValues.length];const x=xValues[index%xValues.length];const y=yValues[index%yValues.length];gsap.set(targetEl,{rotate:0,x:0,y:0,scale:1,zIndex:cards.length-index});gsap.to(targetEl,{rotate,x,y,ease:'power1.in',overwrite:'auto',scrollTrigger:{id:`stacking-rotate-${index}`,trigger:card,start:'top 75%',end:`top-=${stickyTop} top`,scrub:true}});ScrollTrigger.create({id:`stacking-bounce-${index}`,trigger:card,start:`top-=${stickyTop} top`,onEnter:()=>pulseElement(targetEl)});});});ScrollTrigger.refresh();function parseRotateValues(section,attr){const fallback=[0,4,-4];const values=(section.getAttribute(attr)||'').split(',').map(val=>parseFloat(val.trim()));return values.length>=1&&values.every(v=>!isNaN(v))?values:fallback;}function parseAxisValues(section,attr){const raw=section.getAttribute(attr);if(!raw)return['0em','0em','0em'];const values=raw.split(',').map(val=>val.trim()).filter(val=>val!=='');return values.length?values:['0em','0em','0em'];}if(!window._hasStackingResizeListener){let last=getCurrentViewportTier();window.addEventListener('resize',debounceOnWidthChange(()=>{const next=getCurrentViewportTier();if(last!==next){ScrollTrigger.getAll().forEach(t=>{if(t.vars?.id?.startsWith('stacking'))t.kill();});cardsSections.forEach(section=>{section.querySelectorAll('[data-stacking-card-target]').forEach(el=>{gsap.killTweensOf(el);gsap.set(el,{clearProps:'all'});});});initStackingStickyCardsBounce();}last=next;window.viewportTier=next;},250));window._hasStackingResizeListener=true;}function getCurrentViewportTier(){const width=window.innerWidth;if(width<=479)return'mobile-portrait';if(width<=767)return'mobile-landscape';if(width<=991)return'tablet';return'desktop';}function pulseElement(targetEl){const width=targetEl.offsetWidth,height=targetEl.offsetHeight,fontSize=parseFloat(getComputedStyle(targetEl).fontSize),stretchPx=1.5*fontSize,targetScaleX=(width+stretchPx)/width,targetScaleY=(height-stretchPx*0.33)/height;const tl=gsap.timeline();tl.to(targetEl,{scaleX:targetScaleX,scaleY:targetScaleY,duration:0.1,ease:'power1.out'}).to(targetEl,{scaleX:1,scaleY:1,duration:1,ease:'elastic.out(1, 0.3)']);}}
    function debounceOnWidthChange(fn,ms){let last=innerWidth,timer;return function(...args){clearTimeout(timer);timer=setTimeout(()=>{if(innerWidth!==last){last=innerWidth;fn.apply(this,args);}},ms);};}
    document.addEventListener('DOMContentLoaded',function(){initStackingStickyCardsBounce();});
  </script>
</body>
</html>
