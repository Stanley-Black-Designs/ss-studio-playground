  <script>
    function initFalling2DMatterJS(){const canvas=document.querySelector("#canvas-target");if(!canvas){return;}const canvasWidth=canvas.clientWidth+2;const canvasHeight=canvas.clientHeight+2;const canvasWallDepth=canvasWidth/4;const smileyAmount=15;const smileySize=canvasWidth/7.5;const smileySizeTexture=256;const smileySizeScale=smileySize/smileySizeTexture;const smileyRestitution=0.75;const worldGravity=2;let{Engine,Render,Runner,Bodies,Composite,Mouse,MouseConstraint}=Matter;let engine=Engine.create();engine.world.gravity.y=worldGravity;let render=Render.create({element:canvas,engine:engine,options:{background:"transparent",wireframes:false,width:canvasWidth,height:canvasHeight,pixelRatio:2,border:"none"}});function getRandomNumber(min,max){return Math.random()*(max-min)+min;}let min=smileySize/2;let max=canvasWidth-(smileySize/2);let textureArray=['https://cdn.prod.website-files.com/67f388c94c43e20cfb7ca732/67f394c931c1e6fc303e12ec_smiley-1.svg','https://cdn.prod.website-files.com/67f388c94c43e20cfb7ca732/67f394c9718ec3640accf3d4_smiley-2.svg','https://cdn.prod.website-files.com/67f388c94c43e20cfb7ca732/67f394c940dfb6d33af4c6d6_smiley-3.svg','https://cdn.prod.website-files.com/67f388c94c43e20cfb7ca732/67f394c9ab4fc0301d56d8c5_smiley-4.svg','https://cdn.prod.website-files.com/67f388c94c43e20cfb7ca732/67f394c9d9ee6112fdb67b89_smiley-5.svg'];let textureIndex=0;function getNextTexture(){const texture=textureArray[textureIndex];textureIndex=(textureIndex+1)%textureArray.length;return texture;}const smileyCreate=()=>{let smiley=Bodies.rectangle(getRandomNumber(min,max),smileySize,smileySize,smileySize,{chamfer:{radius:smileySize/2},restitution:smileyRestitution,render:{sprite:{texture:getNextTexture(),xScale:smileySizeScale,yScale:smileySizeScale}}});Composite.add(engine.world,smiley);};let boxTop=Bodies.rectangle(canvasWidth/2+(canvasWallDepth*2),canvasHeight+canvasWallDepth,canvasWidth+(canvasWallDepth*4),(canvasWallDepth*2),{isStatic:true});let boxLeft=Bodies.rectangle((canvasWallDepth*-1),canvasHeight/2,(canvasWallDepth*2),canvasHeight,{isStatic:true});let boxRight=Bodies.rectangle(canvasWidth+canvasWallDepth,canvasHeight/2,(canvasWallDepth*2),canvasHeight,{isStatic:true});let boxBottom=Bodies.rectangle(canvasWidth/2+(canvasWallDepth*2),(canvasWallDepth*-1),canvasWidth+(canvasWallDepth*4),(canvasWallDepth*2),{isStatic:true});Composite.add(engine.world,[boxTop,boxLeft,boxRight,boxBottom]);Render.run(render);let runner=Runner.create();Matter.Runner.run(runner,engine);function repeatedFunction(count,maxCount){if(count<maxCount){smileyCreate();setTimeout(()=>{repeatedFunction(count+1,maxCount);},100);}}repeatedFunction(0,smileyAmount);let mouse=Mouse.create(render.canvas);let mouseConstraint=MouseConstraint.create(engine,{mouse:mouse,constraint:{stiffness:0.2,render:{visible:false}}});Composite.add(engine.world,mouseConstraint);mouseConstraint.mouse.element.removeEventListener("mousewheel",mouseConstraint.mouse.mousewheel);mouseConstraint.mouse.element.removeEventListener("DOMMouseScroll",mouseConstraint.mouse.mousewheel);mouseConstraint.mouse.element.removeEventListener('touchstart',mouseConstraint.mouse.mousedown);mouseConstraint.mouse.element.removeEventListener('touchmove',mouseConstraint.mouse.mousemove);mouseConstraint.mouse.element.removeEventListener('touchend',mouseConstraint.mouse.mouseup);mouseConstraint.mouse.element.addEventListener('touchstart',mouseConstraint.mouse.mousedown,{passive:true});mouseConstraint.mouse.element.addEventListener('touchmove',(e)=>{if(mouseConstraint.body){mouseConstraint.mouse.mousemove(e);}});mouseConstraint.mouse.element.addEventListener('touchend',(e)=>{if(mouseConstraint.body){mouseConstraint.mouse.mouseup(e);}});}
    document.addEventListener('DOMContentLoaded',function(){initFalling2DMatterJS();});
