<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scaling Element on Scroll — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0ece4;color:#131313;font-family:'Inter',sans-serif;padding-top:50px;-webkit-font-smoothing:antialiased}
    .resource-wrapper{position:relative;overflow:hidden}
    .scaling-element-header{gap:3em;flex-flow:column;justify-content:center;align-items:center;min-height:100vh;padding:25vh 5vw 20vh;display:flex;position:relative}
    .scaling-element-header__h1{text-align:center;max-width:9em;margin:0 0 .25em;font-size:clamp(36px,7vw,7em);font-weight:500;line-height:1}
    .scaling-element-header__eyebrow{color:#9d420a;text-transform:uppercase;font-size:1.25em;font-weight:400;letter-spacing:.08em}
    .scaling-element-video{gap:25vh;flex-flow:column;justify-content:center;align-items:center;padding-bottom:25vh;padding-left:5vw;padding-right:5vw;display:flex;position:relative}
    .scaling-element__big-box{border-radius:1em;width:100%;position:relative}
    .scaling-element__small-box{border-radius:1em;width:20em;position:relative}
    .scaling-video__wrapper{width:100%;height:100%;position:absolute;top:0;left:0}
    .scaling-video{will-change:transform;background-color:#d2800f;border-radius:1em;justify-content:center;align-items:center;width:100%;height:100%;display:flex;position:absolute;top:0;left:0;overflow:hidden;isolation:isolate;transform:translateX(0) rotate(0.001deg)}
    .scaling-video__before{padding-top:56.25%}
    .scaling-video__video{object-fit:cover;width:100%;height:100%;padding-bottom:0;padding-right:0;position:absolute;border-radius:inherit}
    .scaling-video__svg{color:#fff;mix-blend-mode:overlay;width:6.25em;position:absolute}
    @media (max-width:767px){.scaling-element-header__h1{font-size:13.5vw}.scaling-element__small-box{width:15em}.scaling-video__svg{width:5em}}
  </style>
</head>
<body>
  <div class="demo-chrome" style="background:rgba(240,236,228,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.1);">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back" style="color:rgba(19,19,19,0.55);"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep" style="background:rgba(0,0,0,0.12);"></div>
      <span class="demo-chrome__title" style="color:#131313;">Scaling Element on Scroll</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="demo-chrome-mobile-cta">
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Have a project in mind?</a>
  </div>


  <div class="resource-wrapper">
    <section class="scaling-element-header">
      <span class="scaling-element-header__eyebrow">[ Resource ]</span>
      <h1 class="scaling-element-header__h1">Scaling element on scroll with Flip</h1>
      <div class="scaling-element__small-box">
        <div class="scaling-video__before"></div>
        <div data-flip-element="wrapper" class="scaling-video__wrapper">
          <div data-flip-element="target" class="scaling-video">
            <video autoplay muted playsinline loop class="scaling-video__video"><source src="https://osmo.b-cdn.net/resource-media/scaling-element-resource-185787-876545918_tiny.mp4" type="video/mp4"></video>
            <svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 138 138" fill="none" class="scaling-video__svg"><path d="M81.7432 46.534C79.5777 48.6995 75.875 47.1659 75.875 44.1034V0.25H62.125V51.8124C62.125 57.5079 57.5079 62.1249 51.8125 62.1249H0.25V75.8749H44.1034C47.1659 75.8749 48.6996 79.5776 46.5341 81.7431L16.0136 112.263L25.7364 121.986L56.2569 91.466C58.416 89.3069 62.1031 90.825 62.125 93.8693V137.75H75.8751L75.875 86.1874C75.875 80.492 80.4921 75.8749 86.1875 75.8749H137.75V62.1249H93.8692C90.8339 62.1031 89.3157 58.4375 91.4469 56.2759L91.4659 56.2569L121.986 25.7363L112.264 16.0137L81.7432 46.534Z" fill="currentColor"></path></svg>
          </div>
        </div>
      </div>
    </section>
    <section class="scaling-element-video">
      <div class="scaling-element__big-box">
        <div class="scaling-video__before"></div>
        <div data-flip-element="wrapper" class="scaling-video__wrapper"></div>
      </div>
      <h1 class="scaling-element-header__h1">More content can go here after the full-bleed state.</h1>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Flip.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger,Flip);
    function initFlipOnScroll(){let wrapperElements=document.querySelectorAll("[data-flip-element='wrapper']");let targetEl=document.querySelector("[data-flip-element='target']");let tl;function flipTimeline(){if(tl){tl.kill();gsap.set(targetEl,{clearProps:"all"});}tl=gsap.timeline({scrollTrigger:{trigger:wrapperElements[0],start:"center center",endTrigger:wrapperElements[wrapperElements.length-1],end:"center center",scrub:0.25}});wrapperElements.forEach(function(element,index){let nextIndex=index+1;if(nextIndex<wrapperElements.length){let nextWrapperEl=wrapperElements[nextIndex];let nextRect=nextWrapperEl.getBoundingClientRect();let thisRect=element.getBoundingClientRect();let nextDistance=nextRect.top+window.pageYOffset+nextWrapperEl.offsetHeight/2;let thisDistance=thisRect.top+window.pageYOffset+element.offsetHeight/2;let offset=nextDistance-thisDistance;tl.add(Flip.fit(targetEl,nextWrapperEl,{duration:offset,ease:"none"}));}});}flipTimeline();let resizeTimer;window.addEventListener("resize",function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){flipTimeline();},100);});}
    document.addEventListener('DOMContentLoaded',function(){initFlipOnScroll();});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
