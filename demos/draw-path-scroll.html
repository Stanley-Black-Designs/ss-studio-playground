<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw Path on Scroll — Stanley Smith Studios</title>
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0d10;
      color: #f0f0f2;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    [data-draw-scroll-wrap] {
      position: relative;
      width: 100%;
    }

    [data-draw-scroll-desktop],
    [data-draw-scroll-mobile] {
      display: block;
      width: 100%;
      height: auto;
    }

    [data-draw-scroll-mobile] { display: none; }

    [data-draw-scroll-path] {
      stroke: #0064E7;
      fill: none;
      stroke-width: 60;
      stroke-linecap: round;
    }

    /* track line (faint) */
    .path-track {
      stroke: rgba(255,255,255,0.06);
      fill: none;
      stroke-width: 60;
      stroke-linecap: round;
    }

    .scroll-label {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,240,242,0.4);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .scroll-label svg { animation: bounce 1.4s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    @media (max-width: 768px) {
      [data-draw-scroll-desktop] { display: none; }
      [data-draw-scroll-mobile] { display: block; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="demo-chrome">
    <a class="demo-chrome__back" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </a>
    <span class="demo-chrome__title">Draw Path on Scroll</span>
    <a class="demo-chrome__cta" href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener">Book a call</a>
  </header>

  <div data-draw-scroll-wrap>

    <!-- Desktop SVG -->
    <svg data-draw-scroll-desktop viewBox="0 0 1040 2430" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <path class="path-track" d="M587.951 30.0063C718.546 287.255 342.671 289.11 285.441 462.218C228.211 635.326 611.831 627.545 638.981 800.141C666.131 972.737 264.181 991.748 246.651 1167.14C229.121 1342.53 619.571 1326.92 638.981 1500.64C658.391 1674.36 259.621 1663.25 246.651 1836.44C233.681 2009.63 628.531 2008.73 638.981 2180.64C644.796 2278.09 559.464 2338.96 490.431 2399.99"/>
      <path class="path-track" data-draw-scroll-path d="M587.951 30.0063C718.546 287.255 342.671 289.11 285.441 462.218C228.211 635.326 611.831 627.545 638.981 800.141C666.131 972.737 264.181 991.748 246.651 1167.14C229.121 1342.53 619.571 1326.92 638.981 1500.64C658.391 1674.36 259.621 1663.25 246.651 1836.44C233.681 2009.63 628.531 2008.73 638.981 2180.64C644.796 2278.09 559.464 2338.96 490.431 2399.99"/>
    </svg>

    <!-- Mobile SVG -->
    <svg data-draw-scroll-mobile viewBox="0 0 448 2433" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <path class="path-track" d="M261.417 30.502C326.48 118.169 149.393 136.669 128.393 233.502C107.393 330.335 280.393 334.502 296.393 431.502C312.393 528.502 124.393 541.335 117.393 640.502C110.393 739.669 292.393 737.335 296.393 835.502C300.393 933.669 119.393 938.669 117.393 1038.5C115.393 1138.33 296.393 1137.5 296.393 1236.5C296.393 1335.5 116.393 1334.5 117.393 1433.5C118.393 1532.5 296.393 1532.5 296.393 1631C296.393 1729.5 117.393 1729.5 117.393 1828C117.393 1926.5 296.393 1926.5 296.393 2025C296.393 2123.5 117.393 2123.5 117.393 2222C117.393 2295.67 174.56 2349.17 203.143 2402.5"/>

    </svg>

  </div>

  <p class="scroll-label">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7l5 5 5-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Scroll to draw
  </p>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/DrawSVGPlugin.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger, DrawSVGPlugin);

    function initDrawPathOnScroll() {
      const wrap = document.querySelector('[data-draw-scroll-wrap]');
      if (!wrap) return;

      const paths = wrap.querySelectorAll('[data-draw-scroll-path]');

      paths.forEach(path => {
        gsap.set(path, { drawSVG: 0 });

        ScrollTrigger.create({
          trigger: wrap,
          start: 'top top',
          end: 'bottom bottom',
          scrub: 1.5,
          animation: gsap.to(path, { drawSVG: '100%', ease: 'none' })
        });
      });

      // Hide scroll label on first scroll
      const label = document.querySelector('.scroll-label');
      ScrollTrigger.create({
        trigger: wrap,
        start: 'top-=1 top',
        onEnter: () => { if (label) gsap.to(label, { opacity: 0, duration: 0.4 }); }
      });
    }

    initDrawPathOnScroll();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
</body>
</html>
