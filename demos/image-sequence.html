<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Sequence on Scroll — Stanley Smith Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="demo-chrome.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0c0d10; font-family: 'Inter', sans-serif; }
    .chrome-space { height: 50px; }
    .image-sequence__wrap { width: 100%; height: 300vh; position: relative; }
    .image-sequence__sticky { justify-content: center; align-items: center; width: 100%; height: 100vh; display: flex; position: sticky; top: 0; }
    .image-sequence__element { z-index: 0; width: 100%; height: 100%; position: absolute; inset: 0%; }
    .image-sequence__canvas { width: 100%; height: 100%; padding: 0; position: relative; }
    .scroll-hint { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); color: rgba(240,240,242,0.35); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="demo-chrome">
    <div class="demo-chrome__left">
      <a href="../index.html" class="demo-chrome__back"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to Playground</a>
      <div class="demo-chrome__sep"></div><span class="demo-chrome__title">Image Sequence on Scroll</span>
    </div>
    <a href="https://calendly.com/stanleysmithstudios/30min" target="_blank" rel="noopener" class="demo-chrome__cta">Have a project in mind?</a>
  </div>
  <div class="chrome-space"></div>
  <div data-sequence-wrap data-scroll-end="bottom top" data-scroll-start="top top" class="image-sequence__wrap">
    <div class="image-sequence__sticky">
      <div data-sequence-element class="image-sequence__element">
        <canvas data-sequence-canvas
          data-desktop-src="https://osmo.b-cdn.net/resource-media/image-sequence-demo/desktop/highres"
          data-mobile-src="https://osmo.b-cdn.net/resource-media/image-sequence-demo/mobile/mobile"
          data-static-src="https://osmo.b-cdn.net/resource-media/image-sequence-demo/desktop/highres000.webp"
          data-filetype="webp" data-frames="120" data-digits="3" data-index-start="0"
          class="image-sequence__canvas"></canvas>
      </div>
    </div>
  </div>
  <p class="scroll-hint">↓ Scroll to animate</p>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);
    function initImageSequenceScroll(){const wraps=document.querySelectorAll('[data-sequence-wrap]');wraps.forEach(wrap=>{if(wrap.dataset.sequenceInit==='true')return;wrap.dataset.sequenceInit='true';const element=wrap.querySelector('[data-sequence-element]');const canvas=element&&element.querySelector('[data-sequence-canvas]');if(!element||!canvas)return;const frames=parseInt(canvas.dataset.frames,10)||1;const digits=parseInt(canvas.dataset.digits,10)||3;const indexStart=parseInt(canvas.dataset.indexStart,10)||0;const desktopSrc=canvas.dataset.desktopSrc||'';const mobileSrc=canvas.dataset.mobileSrc||desktopSrc;const staticSrc=canvas.dataset.staticSrc;const filetype=canvas.dataset.filetype||'webp';const startTrigger=wrap.dataset.scrollStart||'top top';const endTrigger=wrap.dataset.scrollEnd||'bottom top';const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;const isMobile=window.matchMedia('(max-width: 767px)').matches;const baseUrl=isMobile?mobileSrc:desktopSrc;const lastIndex=indexStart+frames-1;let lastProgress=0;const ctx=canvas.getContext('2d');function resizeCanvas(){const dpr=window.devicePixelRatio||1;const width=element.clientWidth;const height=element.clientHeight;if(canvas.width!==width*dpr||canvas.height!==height*dpr){canvas.width=width*dpr;canvas.height=height*dpr;canvas.style.width=`${width}px`;canvas.style.height=`${height}px`;}}resizeCanvas();const loaded=new Map();const queue=[];let processingQueue=false;let resizeTimer;function drawCover(img){if(!img)return;resizeCanvas();const cW=canvas.width,cH=canvas.height;const scale=Math.max(cW/img.width,cH/img.height);const x=(cW-img.width*scale)/2;const y=(cH-img.height*scale)/2;ctx.clearRect(0,0,cW,cH);ctx.drawImage(img,x,y,img.width*scale,img.height*scale);}window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{resizeCanvas();if(loaded.size)render(lastProgress);ScrollTrigger.refresh();},200);});function pad(num){return String(num).padStart(digits,'0');}function getUrl(i){return`${baseUrl}${pad(i)}.${filetype}`;}function loadFrame(i,onDone){if(loaded.has(i)||i<indexStart||i>lastIndex)return;const img=new Image();img.src=getUrl(i);img.onload=()=>{loaded.set(i,img);if(typeof onDone==='function')onDone();};img.onerror=()=>{};}function processQueue(){if(processingQueue)return;const next=queue.shift();if(!next)return;processingQueue=true;const[a,b]=next;if(b-a<=1){processingQueue=false;processQueue();return;}const m=Math.floor((a+b)/2);loadFrame(m,()=>{queue.push([a,m],[m,b]);processingQueue=false;setTimeout(processQueue,0);});}function startLoading(){loadFrame(indexStart,()=>{drawImageAt(indexStart);loadFrame(lastIndex);queue.push([indexStart,lastIndex]);processQueue();ScrollTrigger.refresh();});}function findNearestLoaded(i){for(let r=1;r<=10;r++){if(loaded.has(i-r))return i-r;if(loaded.has(i+r))return i+r;}const keys=Array.from(loaded.keys());if(keys.length===0)return null;let nearest=keys[0];let minDiff=Math.abs(i-nearest);for(const k of keys){const diff=Math.abs(i-k);if(diff<minDiff){nearest=k;minDiff=diff;}}return nearest;}function drawImageAt(i){const img=loaded.get(i);if(!img)return;drawCover(img);}function render(progress){const relative=progress*(frames-1);const index=indexStart+Math.round(relative);if(loaded.has(index)){drawImageAt(index);}else{const nearest=findNearestLoaded(index);if(nearest!==null)drawImageAt(nearest);}}if(reduceMotion){if(staticSrc){const si=new Image();si.src=staticSrc;si.onload=()=>{drawCover(si);};return;}loadFrame(indexStart,()=>{drawImageAt(indexStart);});return;}startLoading();const st=ScrollTrigger.create({trigger:wrap,start:startTrigger,end:endTrigger,scrub:true,onUpdate:self=>{lastProgress=self.progress;render(self.progress);}});lastProgress=st.progress||0;render(lastProgress);});}
    document.addEventListener("DOMContentLoaded",()=>{initImageSequenceScroll();});
  </script>
</body>
</html>
